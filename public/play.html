    <title>Fomo Flight Play Preview</title>
    <style>
      * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: #070914; touch-action: none; }
      body {
        display: grid;
        place-items: center;
        padding: max(env(safe-area-inset-top), 8px) max(env(safe-area-inset-right), 8px) max(env(safe-area-inset-bottom), 8px) max(env(safe-area-inset-left), 8px);
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at 50% 0%, rgba(0, 229, 255, 0.18), transparent 32rem),
          linear-gradient(180deg, #070914 0%, #090d1f 55%, #070914 100%);
      }
      canvas {
        width: min(100vw, calc(100vh * 9 / 16));
        height: min(100vh, calc(100vw * 16 / 9));
        max-width: 540px;
        max-height: 960px;
        border: 1px solid rgba(125, 236, 255, 0.28);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.38), 0 0 54px rgba(0, 229, 255, 0.12);
        background: #070914;
        display: block;
      }
      .nick-modal {
        position: fixed;
        inset: 0;
        z-index: 20;
        display: grid;
        place-items: center;
        padding: 18px;
        background: rgba(3, 7, 18, 0.72);
        backdrop-filter: blur(10px);
        touch-action: manipulation;
      }
      .nick-modal[hidden] { display: none; }
      .nick-panel {
        width: min(92vw, 420px);
        border: 1px solid rgba(45, 239, 255, 0.76);
        border-radius: 12px;
        padding: 22px;
        background: linear-gradient(135deg, rgba(5, 15, 31, 0.98), rgba(15, 10, 40, 0.96));
        box-shadow: 0 0 32px rgba(0, 229, 255, 0.24), 0 0 42px rgba(125, 92, 255, 0.18);
      }
      .nick-title {
        margin: 0 0 8px;
        color: #effcff;
        font-size: 24px;
        font-weight: 950;
        text-align: center;
        touch-action: manipulation;
        user-select: text;
        text-transform: uppercase;
      }
      .nick-hint {
        margin: 0 0 18px;
        color: #7de9ff;
        font-size: 13px;
        font-weight: 800;
        text-align: center;
      }
      .nick-input {
        width: 100%;
        height: 54px;
        border: 1px solid rgba(48, 255, 159, 0.7);
        border-radius: 9px;
        outline: none;
        padding: 0 14px;
        color: #effcff;
        background: rgba(2, 8, 18, 0.92);
        box-shadow: 0 0 18px rgba(48, 255, 159, 0.16);
        font: 900 20px Inter, system-ui, sans-serif;
        text-align: center;
      }
      .nick-error {
        min-height: 20px;
        margin: 10px 0 12px;
        color: #ffd75e;
        font-size: 13px;
        font-weight: 850;
        text-align: center;
      }
      .nick-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .nick-actions button {
        height: 48px;
        border: 1px solid currentColor;
        border-radius: 8px;
        color: #effcff;
        background: rgba(5, 12, 28, 0.96);
        font: 900 15px Inter, system-ui, sans-serif;
        box-shadow: 0 0 16px rgba(125, 92, 255, 0.2);
      }
      #nickSave { color: #30ff9f; }
      #nickCancel { color: #8b7dff; }
    </style>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>

            if (!raw && key !== KEY) raw = localStorage.getItem(KEY);
            const saved = JSON.parse(raw);
            return normalizeProgress({ coins: 0, best: 0, selected: "vt", unlocked: ["vt"], lastDaily: "", streak: 0, lang: defaultLang, userId: "", nickname: "", ...saved });
          } catch {
            return { coins: 0, best: 0, selected: "vt", unlocked: ["vt"], lastDaily: "", streak: 0, lang: defaultLang, userId: localUserId(), nickname: "" };
          }
        };
        const save = () => localStorage.setItem(storageKey(), JSON.stringify(progress));
        let progress = load();
        let state = "start";
        let shopPage = 0;
        let player, obstacles, coins, particles, stars, score, runCoins, speed, spawnTimer, impact;

        let runStartedAt = 0;

        let syncBusy = false;
        let lastRun = { score: 0, vtc: 0, ath: progress.best, newBest: false, line: "" };

        function resetRun() {
          player = { x: 138, y: 438, vy: -360, r: 24, angle: 0 };
          obstacles = [];
          coins = [];
          particles = [];
          stars = Array.from({ length: 64 }, (_, i) => ({
            x: Math.random() * W,
            y: Math.random() * H,
            r: 0.7 + Math.random() * 1.8,
            s: 18 + (i % 5) * 12,
            c: ["#65f6ff", "#7d74ff", "#ffd75e", "#52ff9b"][i % 4]

          score = 0;
          runCoins = 0;
          speed = 205;
          spawnTimer = 760;
          impact = 0;
          runStartedAt = performance.now();
          state = "game";

        function today() {
          return new Date().toISOString().slice(0, 10);
        }

        function dateKey(offset) {
          const d = new Date();
          d.setDate(d.getDate() + offset);
          return d.toISOString().slice(0, 10);
        }

        function canCollectDaily() {
          return progress.lastDaily !== today();
        }

        async function collectDaily() {
          if (!canCollectDaily()) return false;
          if (hasTelegramAuth()) {
            try {
              const data = await api("/api/daily/claim", { method: "POST", body: {} });
              applyServerProfile(data.profile);
              beep(data.claimed ? "buy" : "coin");
              return data.claimed;
            } catch {
              cloudReady = false;
            }
          }
          const yesterday = dateKey(-1);
          const nextStreak = progress.lastDaily === yesterday ? progress.streak + 1 : 1;
          progress.streak = nextStreak > 7 ? 1 : nextStreak;
          progress.coins += 50;
          progress.lastDaily = today();
          save();
          beep("buy");
          return true;
        }

        function normalizeProgress(value) {
          const ids = skins.map((skin) => skin.id);
          const legacyMap = { gold: "ton", diamond: "xrp", ghost: "trx", bull: "sol" };
          const selectedRaw = legacyMap[value.selected] || value.selected;
          const unlocked = Array.isArray(value.unlocked)
            ? value.unlocked.map((id) => legacyMap[id] || id).filter((id) => ids.includes(id))
            : ["vt"];
          if (!unlocked.includes("vt")) unlocked.unshift("vt");
          const rawStreak = Math.max(0, Math.min(7, Number(value.streak) || 0));
          const migratedStreak = rawStreak === 0 && value.lastDaily === today() ? 1 : rawStreak;
          return {
            ...value,
            coins: Math.max(0, Number(value.coins) || 0),
            best: Math.max(0, Number(value.best) || 0),
            selected: ids.includes(selectedRaw) ? selectedRaw : "vt",
            unlocked: [...new Set(unlocked)],
            streak: migratedStreak,
            lang: value.lang === "en" ? "en" : value.lang === "ru" ? "ru" : defaultLang,
            userId: currentUserId(),
            nickname: sanitizeNickname(value.nickname || telegramDisplayName())
          };
        }

        function setupTelegram() {
          if (!tg) return;
          tg.ready && tg.ready();
          tg.expand && tg.expand();
          tg.setHeaderColor && tg.setHeaderColor("#070914");
          tg.setBackgroundColor && tg.setBackgroundColor("#070914");
          tg.disableVerticalSwipes && tg.disableVerticalSwipes();
        }

        function currentUserId() {
          return tgUser && tgUser.id ? `tg-${tgUser.id}` : localUserId();
        }

        function telegramDisplayName() {
          if (!tgUser) return "";
          return sanitizeNickname(tgUser.username || tgUser.first_name || "");
        }

        function storageKey() {
          return `${KEY}:${currentUserId()}`;
        }

        function localUserId() {
          let id = localStorage.getItem("fomo-flight-local-user-id");
          if (!id) {
            id = `local-${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 8)}`;
            localStorage.setItem("fomo-flight-local-user-id", id);
          }
          return id;
        }

        function sanitizeNickname(value) {
          const cleaned = String(value || "").replace(/[^\w\u0430-\u044f\u0410-\u042f\u0451\u0401 -]/g, "").trim().slice(0, 14);
          return cleaned;
        }

        function normalizeNicknameForCheck(value) {
          const map = { a: "\u0430", e: "\u0435", o: "\u043E", p: "\u0440", c: "\u0441", x: "\u0445", y: "\u0443", k: "\u043A", m: "\u043C", h: "\u043D", b: "\u0432", t: "\u0442", 0: "\u043E", 3: "\u0437", 4: "\u0447", 6: "\u0431" };
          return String(value || "")
            .toLowerCase()
            .replace(/[a-z0-9]/g, (ch) => map[ch] || ch)
            .replace(/[\s_\-.]+/g, "");
        }

        function nicknameProblem(value) {
          const cleaned = sanitizeNickname(value);
          if (cleaned.length < 2) return "nicknameBadShort";
          const compact = normalizeNicknameForCheck(cleaned);
          const bad = [
            "\u0431\u043B\u044F",
            "\u0445\u0443\u0439",
            "\u0445\u0443\u0435",
            "\u043F\u0438\u0437\u0434",
            "\u043F\u0438\u0434\u043E\u0440",
            "\u0435\u0431\u0430",

            "\u0435\u0431\u0443",
            "\u0435\u0431\u043B",
            "\u0435\u0431\u043D",
            "\u0451\u0431\u0430",
            "\u0451\u0431\u043D",
            "\u0441\u0443\u043A\u0430",
            "\u0448\u043B\u044E\u0445",
            "\u0433\u0430\u043D\u0434\u043E\u043D"
          ];
          return bad.some((word) => compact.includes(word)) ? "nicknameBadWords" : "";
        }

        function displayName() {
          return progress.nickname || L("you");
        }

        function randomNickname() {
          const names = ["VT Pilot", "Candle Rider", "Fomo Ace", "Moon Tapper", "Liquidity Kid", "Neon Bull", "Gap Hunter"];
          return names[Math.floor(Math.random() * names.length)];
        }

        function L(key) {
          return (copy[progress.lang] || copy.en)[key] || copy.en[key] || key;
        }

        function hasTelegramAuth() {
          return Boolean(tg && tg.initData);
        }

        async function api(path, options = {}) {
          if (!hasTelegramAuth()) throw new Error("telegram_auth_required");
          const response = await fetch(path, {
            method: options.method || "GET",
            headers: {
              "content-type": "application/json",
              "x-telegram-init-data": tg.initData
            },
            body: options.body ? JSON.stringify(options.body) : undefined
          });
          const data = await response.json().catch(() => ({}));
          if (!response.ok) throw new Error(data.error || "api_error");
          return data;
        }

        function applyServerProfile(profile) {
          if (!profile) return;
          progress.coins = Math.max(0, Number(profile.totalVtc) || 0);
          progress.best = Math.max(0, Number(profile.bestScore) || 0);
          progress.selected = skins.some((skin) => skin.id === profile.selectedSkin) ? profile.selectedSkin : progress.selected;
          progress.unlocked = Array.isArray(profile.unlockedSkins) && profile.unlockedSkins.length ? profile.unlockedSkins : progress.unlocked;
          progress.streak = Math.max(0, Math.min(7, Number(profile.dailyStreak) || 0));
          progress.lastDaily = String(profile.lastDaily || "");
          progress.nickname = sanitizeNickname(profile.displayName || progress.nickname);
          cloudReady = true;
          save();
        }

          if (!hasTelegramAuth()) return;

            const data = await api("/api/profile");

          } catch (error) {

          try {
            const response = await fetch("/api/leaderboard");
            const data = await response.json();
            leaderboardCache = Array.isArray(data.rows) ? data.rows : [];
          } catch {
            leaderboardCache = [];
          }
        }

        async function loadConfig() {
          try {
            const response = await fetch("/api/config");
            const data = await response.json();
            if (data.miniAppLink) miniAppLink = data.miniAppLink;
          } catch {}
        }

        async function syncNickname() {
          if (!hasTelegramAuth()) return true;
          try {
            const data = await api("/api/profile/name", { method: "POST", body: { displayName: progress.nickname } });
            applyServerProfile(data.profile);
            await loadLeaderboard();
            return true;
          } catch (error) {
            if (nickModal && !nickModal.hidden) {
              const key = error.message === "name_taken" ? "nicknameTaken" : error.message === "nickname_short" ? "nicknameBadShort" : "nicknameBadWords";
              nickError.textContent = L(key);
            }
            return false;
          }
        }

        async function syncRun(scoreValue, vtcValue, durationMs) {
          if (!hasTelegramAuth() || syncBusy) return;
          syncBusy = true;
          try {
            const data = await api("/api/run/submit", {
              method: "POST",
              body: {
                runId: `${currentUserId()}-${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 8)}`,
                score: Math.floor(scoreValue),
                vtc: Math.floor(vtcValue),
                durationMs: Math.max(1000, Math.floor(durationMs)),
                selectedSkin: progress.selected
              }
            });
            applyServerProfile(data.profile);
            await loadLeaderboard();
          } catch {
            cloudReady = false;
          } finally {
            syncBusy = false;
          }
        }

        function selectedSkin() {
          return skins.find((skin) => skin.id === progress.selected) || skins[0];
        }

        function difficultyCurve() {
          const early = Math.min(1, score / 350);
          const late = Math.min(1, Math.max(0, score - 350) / 950);
          const pressure = early * 0.45 + late * 0.55;
          return {
            speed: 205 + pressure * 185,
            gap: 326 - pressure * 104,
            spawn: 1760 - pressure * 600,
            margin: 245 - pressure * 28
          };
        }

        function beep(kind) {
          if (muted) return;
          const AudioCtx = window.AudioContext || window.webkitAudioContext;
          if (!AudioCtx) return;
          const ac = beep.ac || (beep.ac = new AudioCtx());
          const o = ac.createOscillator();
          const g = ac.createGain();
          const presets = {
            flap: [320, 620, 0.055, "triangle", 0.035],
            coin: [920, 1480, 0.07, "sine", 0.04],
            crash: [160, 52, 0.18, "sawtooth", 0.06],
            buy: [620, 1200, 0.13, "triangle", 0.05]
          };
          const p = presets[kind] || presets.flap;
          o.type = p[3];
          o.frequency.setValueAtTime(p[0], ac.currentTime);
          o.frequency.exponentialRampToValueAtTime(Math.max(1, p[1]), ac.currentTime + p[2]);
          g.gain.setValueAtTime(p[4], ac.currentTime);
          g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + p[2]);
          o.connect(g);
          g.connect(ac.destination);
          o.start();
          o.stop(ac.currentTime + p[2] + 0.01);
        }

        function flap() {
          if (state === "game") {
            player.vy = -430;
            beep("flap");
          }
        }

        function spawnPair() {
          const difficulty = difficultyCurve();
          const gap = difficulty.gap;
          const center = difficulty.margin + Math.random() * (H - difficulty.margin * 2);
          const topH = Math.max(94, center - gap / 2);
          const bottomY = center + gap / 2;
          obstacles.push({ x: W + 86, y: 0, w: 70, h: topH, top: true, c: Math.random() > 0.5 ? "#1df28d" : "#ff4461" });
          obstacles.push({ x: W + 86, y: bottomY, w: 70, h: H - bottomY, top: false, c: Math.random() > 0.5 ? "#1df28d" : "#ff4461" });
          const count = 5 + Math.floor(Math.random() * 4);
          for (let i = 0; i < count; i += 1) {
            const t = count === 1 ? 0.5 : i / (count - 1);
            coins.push({ x: W + 210 + i * 46, y: center - Math.sin(t * Math.PI) * Math.min(46, gap * 0.18), r: 14, spin: 0 });
          }
        }

        function update(dt) {
          if (state !== "game") return;
          const difficulty = difficultyCurve();
          speed += (difficulty.speed - speed) * Math.min(1, dt * 1.8);
          score += speed * dt / 15.5;
          spawnTimer -= dt * 1000;
          if (spawnTimer <= 0) {
            spawnPair();
            spawnTimer = difficulty.spawn;
          }
          player.vy += 1130 * dt;
          player.y += player.vy * dt;
          player.angle = Math.max(-0.42, Math.min(0.58, player.vy / 980));
          if (Math.random() < 0.85) {
            const s = selectedSkin();
            particles.push({ x: player.x - 46, y: player.y + (Math.random() - 0.5) * 18, vx: -90 - Math.random() * 70, vy: (Math.random() - 0.5) * 32, life: 0.35, c: s.trail, r: 5 + Math.random() * 4 });
          }
          stars.forEach((star) => {
            star.x -= star.s * dt;
            if (star.x < -8) { star.x = W + 8; star.y = Math.random() * H; }
          });
          obstacles.forEach((ob) => ob.x -= speed * dt);
          coins.forEach((coin) => { coin.x -= speed * dt; coin.spin += dt * 9; });
          particles.forEach((p) => { p.x += p.vx * dt; p.y += p.vy * dt; p.life -= dt; });
          obstacles = obstacles.filter((ob) => ob.x > -120);
          coins = coins.filter((coin) => coin.x > -60);
          particles = particles.filter((p) => p.life > 0);

          for (const coin of coins) {
            if (obstacles.some((ob) => coinHitsObstacle(coin, ob))) {
              coin.hit = true;
              continue;
            }
            if (Math.hypot(player.x - coin.x, player.y - coin.y) < player.r + coin.r) {
              coin.hit = true;
              runCoins += 1;
              beep("coin");
              for (let i = 0; i < 7; i += 1) {
                particles.push({ x: coin.x, y: coin.y, vx: -40 + Math.random() * 80, vy: -70 + Math.random() * 140, life: 0.25, c: "#ffd75e", r: 2 + Math.random() * 4 });
              }
            }
          }
          coins = coins.filter((coin) => !coin.hit);

          if (player.y < 32 || player.y > H - 32 || obstacles.some(hitObstacle)) crash();
        }

        function hitObstacle(ob) {
          const pad = 9;
          const left = ob.x - ob.w / 2 + pad;
          const right = ob.x + ob.w / 2 - pad;
          const top = ob.y + pad;
          const bottom = ob.y + ob.h - pad;
          const nx = Math.max(left, Math.min(player.x, right));
          const ny = Math.max(top, Math.min(player.y, bottom));
          return Math.hypot(player.x - nx, player.y - ny) < player.r;
        }

        function coinHitsObstacle(coin, ob) {
          const left = ob.x - ob.w / 2 - coin.r - 10;
          const right = ob.x + ob.w / 2 + coin.r + 10;
          const top = ob.y - coin.r - 10;
          const bottom = ob.y + ob.h + coin.r + 10;
          return coin.x >= left && coin.x <= right && coin.y >= top && coin.y <= bottom;
        }

        function crash() {
          const finalScore = Math.floor(score);
          const durationMs = performance.now() - runStartedAt;
          const oldBest = progress.best;
          const isNewBest = finalScore > oldBest;
          const line = gameOverLine();
          state = "over";
          impact = 16;
          progress.coins += runCoins;
          progress.best = Math.max(progress.best, finalScore);
          lastRun = { score: finalScore, vtc: runCoins, ath: progress.best, newBest: isNewBest, line };
          save();
          syncRun(finalScore, runCoins, durationMs);
          beep("crash");
        }

        function drawBg() {
          const g = ctx.createLinearGradient(0, 0, 0, H);
          g.addColorStop(0, "#030712");
          g.addColorStop(0.48, "#061022");
          g.addColorStop(1, "#030711");
          ctx.fillStyle = g;
          ctx.fillRect(0, 0, W, H);
          const scan = ctx.createLinearGradient(0, 0, W, H);
          scan.addColorStop(0, "rgba(0, 229, 255, .10)");
          scan.addColorStop(0.54, "rgba(125, 92, 255, .04)");
          scan.addColorStop(1, "rgba(255, 216, 86, .06)");
          ctx.fillStyle = scan;
          ctx.fillRect(0, 0, W, H);
          ctx.strokeStyle = "rgba(33,79,120,.26)";
          ctx.lineWidth = 1;
          for (let x = 0; x <= W; x += 27) line(x, 0, x, H);
          for (let y = 0; y <= H; y += 27) line(0, y, W, y);
          ctx.strokeStyle = "rgba(45, 240, 255, .16)";
          for (let x = -60; x < W; x += 128) line(x, 0, x + 170, H);
          stars.forEach((s) => {
            ctx.globalAlpha = 0.55;
            ctx.fillStyle = s.c;
            circle(s.x, s.y, s.r);
          });
          ctx.globalAlpha = 1;
          drawCodeRain();
          drawMarketCandles(392, 135, 0.62);
          ctx.strokeStyle = "rgba(48,255,159,.28)";
          ctx.lineWidth = 2.6;
          const drift = Number(score) || 0;
          ctx.beginPath();
          for (let x = 0; x <= W + 60; x += 36) {
            const y = 760 + Math.sin((x + drift) * 0.035) * 30 + Math.sin((x + drift) * 0.012) * 46;
            if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
          }
          ctx.stroke();
          drawFarCoin();
        }

        function drawRocket(x, y, scale, angle, skin) {
          ctx.save();
          ctx.translate(x, y);
          ctx.rotate(angle);
          ctx.scale(scale, scale);
          drawPremiumRocketBody(skin);
          ctx.restore();
        }

        function drawGame() {
          drawBg();
          obstacles.forEach(drawCandle);
          coins.forEach(drawCoin);
          particles.forEach((p) => {
            ctx.globalAlpha = Math.max(0, p.life / 0.35);
            circle(p.x, p.y, p.r, p.c);
            ctx.globalAlpha = 1;
          });
          drawRocket(player.x, player.y, 0.92, player.angle, selectedSkin());
          ctx.globalAlpha = 0.92;
          roundRect(22, 20, 496, 86, 14, "rgba(3,8,18,.78)");
          ctx.globalAlpha = 1;
          drawVTLogo(54, 62, 22);
          pill(127, 62, "PNL", String(Math.floor(score)), "#30ff9f");
          pill(292, 62, L("coins"), String(runCoins), "#ffd75e");
          pill(451, 62, "ATH", String(Math.max(progress.best, Math.floor(score))), "#7de9ff");
          text(L("flightLive"), 270, 126, 13, "#5f7d8b", "850");
        }

        function drawCandle(ob) {
          ctx.save();
          ctx.shadowColor = ob.c;
          ctx.shadowBlur = 24;
          roundRect(ob.x - ob.w / 2, ob.y, ob.w, ob.h, 7, "rgba(2,8,15,.9)");
          roundRect(ob.x - ob.w / 2 + 7, ob.y + 8, ob.w - 14, Math.max(0, ob.h - 16), 6, ob.c);
          ctx.shadowBlur = 0;
          ctx.globalAlpha = 0.24;
          roundRect(ob.x - ob.w / 2 + 15, ob.y + 18, 8, Math.max(0, ob.h - 36), 4, "#ffffff");
          ctx.globalAlpha = 0.28;
          for (let yy = ob.y + 28; yy < ob.y + ob.h - 18; yy += 34) {
            line(ob.x - 18, yy, ob.x + 20, yy + 9);
          }
          ctx.globalAlpha = 1;
          ctx.strokeStyle = ob.c;
          ctx.lineWidth = 4;
          line(ob.x, ob.y - 18, ob.x, ob.y + ob.h + 18);
          ctx.strokeStyle = "rgba(255,255,255,.22)";

        function drawTinyCoin(x, y, color, r = 15) {
          circle(x, y, r, color);
          ctx.strokeStyle = "#fff5b3";
          ctx.lineWidth = Math.max(2, r * 0.2);
          ctx.beginPath();
          ctx.arc(x, y, r - 4, 0, Math.PI * 2);
          ctx.stroke();
          const inner = ctx.createLinearGradient(x - r, y - r, x + r, y + r);
          inner.addColorStop(0, "#19e8ff");
          inner.addColorStop(0.55, "#2477ff");
          inner.addColorStop(1, "#8b5cff");
          ctx.strokeStyle = inner;
          ctx.lineWidth = Math.max(1.5, r * 0.14);
          ctx.beginPath();
          ctx.arc(x, y, r * 0.48, -0.2, Math.PI * 1.72);
          ctx.stroke();
          ctx.font = `900 ${Math.max(8, Math.floor(r * 0.58))}px Inter, system-ui, sans-serif`;
          ctx.fillStyle = "#092032";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText("VT", x, y + 1);
        }

          ctx.save();

          ctx.translate(x, y);

        function leaderboardRows() {
          const best = Math.floor(progress.best);
          if (leaderboardCache.length) {
            const myName = displayName().toLowerCase();
            const remote = leaderboardCache.map((row) => ({
              name: sanitizeNickname(row.displayName || row.name || "Pilot"),
              score: Math.max(0, Math.floor(Number(row.bestScore ?? row.score) || 0))
            }));
            remote.forEach((row) => {
              if (row.name.toLowerCase() === myName && row.score === best) row.me = true;
            });
            if (!remote.some((row) => row.me)) remote.push({ name: displayName(), score: best, me: true });
            const unique = [];
            const seen = new Set();
            for (const row of remote.sort((a, b) => b.score - a.score)) {
              const key = row.me ? "me" : row.name.toLowerCase();
              if (seen.has(key)) continue;
              seen.add(key);
              unique.push(row);
            }
            return unique.slice(0, 15);
          }
          const base = Math.max(best, 840);
          const rows = [
            { name: "Pulse", score: base + 780 },
            { name: "Neon", score: base + 620 },
            { name: "Candle", score: base + 510 },
            { name: "Rocket", score: base + 390 },
            { name: "Whale", score: base + 260 },
            { name: "Scalper", score: base + 160 },
            { name: "Breakout", score: base + 80 },
            { name: displayName(), score: best, me: true },
            { name: "Moon", score: Math.max(0, base - 110) },
            { name: "Funding", score: Math.max(0, base - 220) },
            { name: "Wick", score: Math.max(0, base - 330) },
            { name: "Trend", score: Math.max(0, base - 440) },
            { name: "Degen", score: Math.max(0, base - 550) },
            { name: "Hodler", score: Math.max(0, base - 660) },
            { name: "Ghost", score: Math.max(0, base - 770) }
          ];
          return rows.sort((a, b) => b.score - a.score);
        }

        async function chooseSkin(skin) {
          const owned = progress.unlocked.includes(skin.id);
          if (hasTelegramAuth()) {
            try {
              const data = await api(owned ? "/api/skin/select" : "/api/skin/buy", {
                method: "POST",
                body: { skinId: skin.id }
              });
              applyServerProfile(data.profile);
              beep("buy");
              return;
            } catch {
              impact = 8;
              beep("crash");
              return;
            }
          }
          if (owned) {
            progress.selected = skin.id;
            save();
            beep("buy");
          } else if (progress.coins >= skin.price) {
            progress.coins -= skin.price;
            progress.unlocked.push(skin.id);
            progress.selected = skin.id;
            save();
            beep("buy");
          } else {
            impact = 8;
            beep("crash");
          }
        }

        async function share() {
          const data = lastRun.score ? lastRun : { score: Math.floor(score), vtc: runCoins, ath: progress.best, newBest: false, line: gameOverLine() };
          const message = data.newBest
            ? `Fomo Flight: NEW ATH ${data.ath} PNL, +${data.vtc} VTC. Can you beat it?\n@FomoFlightBot`
            : `Fomo Flight: ${data.score} PNL, +${data.vtc} VTC. Can you beat my ATH?\n@FomoFlightBot`;
          const appLink = miniAppLink;
          const storyText = `${message}\n${appLink}`;
          const shareUrl = `https://t.me/share/url?url=${encodeURIComponent(appLink)}&text=${encodeURIComponent(message)}`;
          const card = createShareCard(data);
          try {
            const blob = await new Promise((resolve) => card.toBlob(resolve, "image/jpeg", 0.9));
            if (tg && tg.shareToStory && hasTelegramAuth()) {
              const media = await uploadShareCard(card);
              tg.shareToStory(media.mediaUrl, {
                text: storyText,
                widget_link: {
                  url: media.miniAppLink || appLink,
                  name: "Play Fomo Flight"
                }
              });
              beep("buy");
              return;
            }
            const file = new File([blob], data.newBest ? "fomo-flight-new-ath.jpg" : "fomo-flight-run.jpg", { type: "image/jpeg" });
            if (navigator.canShare && navigator.canShare({ files: [file] })) {
              await navigator.share({ title: "Fomo Flight", text: message, files: [file] });
            } else if (navigator.share) {
              await navigator.share({ title: "Fomo Flight", text: message, url: appLink });
            } else {
              const imageUrl = URL.createObjectURL(blob);
              window.open(imageUrl, "_blank");
            }
          } catch (error) {
            if (error && error.name === "AbortError") return;
            if (tg && tg.openTelegramLink) tg.openTelegramLink(shareUrl);
            else window.open(shareUrl, "_blank");
          }
          beep("buy");
        }

        function drawCardRocket(c, x, y, scale, angle, skin, victory) {
          c.save();
          c.translate(x, y);
          c.rotate(angle);
          c.scale(scale, scale);
          c.shadowColor = skin.trail;
          c.shadowBlur = 24;
          c.fillStyle = skin.trim;
          cardPath(c, [[-35, -22], [-70, -42], [-10, -38], [20, -18]]);
          cardPath(c, [[-35, 22], [-70, 42], [-10, 38], [20, 18]]);
          const metal = c.createLinearGradient(-70, -35, 80, 35);
          metal.addColorStop(0, "#07111f");
          metal.addColorStop(0.28, skin.body);
          metal.addColorStop(0.55, "#101827");
          metal.addColorStop(0.78, "#dce8ff");
          metal.addColorStop(1, "#070b14");
          c.fillStyle = metal;
          c.beginPath();

        function cardGlow(c, x, y, r, color) {
          const g = c.createRadialGradient(x, y, 0, x, y, r);

        function cardText(c, s, x, y, size, color, weight, stroke = false) {
          c.save();
          c.font = `${weight || 800} ${size}px Inter, system-ui, sans-serif`;
          c.textAlign = "center";

          if (stroke) {

        function cardRound(c, x, y, w, h, r, fill) {
          cardRoundedPath(c, x, y, w, h, r);
          c.fillStyle = fill;
          c.fill();
        }

        function cardRoundedPath(c, x, y, w, h, r) {
          c.beginPath();
          c.moveTo(x + r, y);
          c.arcTo(x + w, y, x + w, y + h, r);
          c.arcTo(x + w, y + h, x, y + h, r);
          c.arcTo(x, y + h, x, y, r);
          c.arcTo(x, y, x + w, y, r);
          c.closePath();
        }

        function cardCircle(c, x, y, r, fill) {
          c.fillStyle = fill;
          c.beginPath();
          c.arc(x, y, r, 0, Math.PI * 2);
          c.fill();
        }

        function cardLine(c, x1, y1, x2, y2) {
          c.beginPath();
          c.moveTo(x1, y1);
          c.lineTo(x2, y2);
          c.stroke();
        }

        function cardPath(c, points) {
          c.beginPath();
          c.moveTo(points[0][0], points[0][1]);
          points.slice(1).forEach((p) => c.lineTo(p[0], p[1]));
          c.closePath();
          c.fill();
        }

          return { x: (e.clientX - r.left) * W / r.width, y: (e.clientY - r.top) * H / r.height };

        function frame(now) {
          const dt = Math.min(0.033, (now - last) / 1000);
          last = now;
          update(dt);
          ctx.save();
          if (impact > 0) {
            impact -= 1;
            ctx.translate((Math.random() - 0.5) * impact, (Math.random() - 0.5) * impact);
          }
          if (state === "start") drawStart();
          if (state === "game") drawGame();
          if (state === "over") drawOver();
          if (state === "shop") drawShop();
          if (state === "leaders") drawLeaders();
          if (state === "daily") drawDaily();
          if (state === "nickname") drawNickname();
          ctx.restore();
          requestAnimationFrame(frame);
        }

        function fitTextSize(label, size, maxWidth) {
          ctx.font = `900 ${size}px Inter, system-ui, sans-serif`;
          let next = size;
          while (next > 10 && ctx.measureText(String(label)).width > maxWidth) {
            next -= 1;
            ctx.font = `900 ${next}px Inter, system-ui, sans-serif`;
          }
          return next;
        }

          fill.addColorStop(0, "rgba(7,18,34,.92)");
          fill.addColorStop(0.52, "rgba(4,9,20,.9)");
          fill.addColorStop(1, "rgba(18,12,42,.82)");
          roundRect(x - w / 2, y - h / 2, w, h, 8, fill);
          ctx.strokeStyle = stroke;
          ctx.globalAlpha = 0.7;
          ctx.lineWidth = 2;
          roundedPath(x - w / 2, y - h / 2, w, h, 8);
          ctx.stroke();
          ctx.globalAlpha = 0.2;
          ctx.strokeStyle = "#ffffff";
          roundedPath(x - w / 2 + 4, y - h / 2 + 4, w - 8, h - 8, 6);
          ctx.stroke();
          ctx.globalAlpha = 1;
        }

        function pill(x, y, label, value, color) {
          roundRect(x - 60, y - 22, 120, 44, 8, "rgba(5,13,26,.88)");
          ctx.strokeStyle = "rgba(46,223,255,.36)";
          ctx.lineWidth = 1;
          roundedPath(x - 60, y - 22, 120, 44, 8);
          ctx.stroke();
          leftText(label, x - 45, y - 8, 11, "#729cab", "800");
          leftText(value, x - 45, y + 13, 18, color, "900");
        }

        function text(s, x, y, size, color, weight) {
          ctx.font = `${weight || 800} ${size}px Inter, system-ui, sans-serif`;
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          if (size >= 32) {
            ctx.save();
            ctx.shadowColor = "rgba(0, 229, 255, .55)";
            ctx.shadowBlur = 14;
            ctx.lineWidth = Math.max(3, size * 0.08);
            ctx.strokeStyle = "rgba(3, 8, 18, .92)";
            ctx.strokeText(s, x, y);
            ctx.restore();
          }
          ctx.fillStyle = color;
          ctx.fillText(s, x, y);
        }

        function leftText(s, x, y, size, color, weight) {
          ctx.font = `${weight || 800} ${size}px Inter, system-ui, sans-serif`;
          ctx.fillStyle = color;
          ctx.textAlign = "left";
          ctx.textBaseline = "middle";
          ctx.fillText(s, x, y);
        }

        function roundRect(x, y, w, h, r, fill) {
          roundedPath(x, y, w, h, r);
          ctx.fillStyle = fill;
          ctx.fill();
        }

        function roundedPath(x, y, w, h, r) {
          const rr = Math.min(r, w / 2, h / 2);
          ctx.beginPath();
          ctx.moveTo(x + rr, y);
          ctx.arcTo(x + w, y, x + w, y + h, rr);
          ctx.arcTo(x + w, y + h, x, y + h, rr);
          ctx.arcTo(x, y + h, x, y, rr);
          ctx.arcTo(x, y, x + w, y, rr);
          ctx.closePath();
        }

        function circle(x, y, r, fill) {
          if (fill) ctx.fillStyle = fill;
          ctx.beginPath();
          ctx.arc(x, y, r, 0, Math.PI * 2);
          ctx.fill();
        }

        function line(x1, y1, x2, y2) {
          ctx.beginPath();
          ctx.moveTo(x1, y1);
          ctx.lineTo(x2, y2);
          ctx.stroke();
        }

        function path(points) {
          ctx.beginPath();
          ctx.moveTo(points[0][0], points[0][1]);
          points.slice(1).forEach((p) => ctx.lineTo(p[0], p[1]));
          ctx.closePath();
          ctx.fill();
        }

        function inRect(px, py, x, y, w, h) {
          return px >= x - w / 2 && px <= x + w / 2 && py >= y - h / 2 && py <= y + h / 2;
        }

        stars = Array.from({ length: 64 }, (_, i) => ({
          x: Math.random() * W,
          y: Math.random() * H,
          r: 0.7 + Math.random() * 1.8,
          s: 18 + (i % 5) * 12,
          c: ["#65f6ff", "#7d74ff", "#ffd75e", "#52ff9b"][i % 4]
        }));
        loadConfig();
        loadLeaderboard();
        loadCloudProfile();
        requestAnimationFrame(frame);
      })();
    </script>
  </body>
</html>
