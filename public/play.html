<html lang="en">

    <title>Fomo Flight Play Preview</title>
    <style>
      * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: #070914; touch-action: none; }
      body {
        display: grid;
        place-items: center;
        padding: max(env(safe-area-inset-top), 8px) max(env(safe-area-inset-right), 8px) max(env(safe-area-inset-bottom), 8px) max(env(safe-area-inset-left), 8px);
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at 50% 0%, rgba(0, 229, 255, 0.18), transparent 32rem),
          linear-gradient(180deg, #070914 0%, #090d1f 55%, #070914 100%);
      }
      canvas {
        width: min(100vw, calc(100vh * 9 / 16));
        height: min(100vh, calc(100vw * 16 / 9));
        max-width: 540px;
        max-height: 960px;
        border: 1px solid rgba(125, 236, 255, 0.28);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.38), 0 0 54px rgba(0, 229, 255, 0.12);
        background: #070914;
        display: block;
      }
      .nick-modal {
        position: fixed;
        inset: 0;
        z-index: 20;
        display: grid;
        place-items: center;
        padding: 18px;
        background: rgba(3, 7, 18, 0.72);
        backdrop-filter: blur(10px);
        touch-action: manipulation;
      }
      .nick-modal[hidden] { display: none; }
      .nick-panel {
        width: min(92vw, 420px);
        border: 1px solid rgba(45, 239, 255, 0.76);
        border-radius: 12px;
        padding: 22px;
        background: linear-gradient(135deg, rgba(5, 15, 31, 0.98), rgba(15, 10, 40, 0.96));
        box-shadow: 0 0 32px rgba(0, 229, 255, 0.24), 0 0 42px rgba(125, 92, 255, 0.18);
      }
      .nick-title {
        margin: 0 0 8px;
        color: #effcff;
        font-size: 24px;
        font-weight: 950;
        text-align: center;
        touch-action: manipulation;
        user-select: text;
        text-transform: uppercase;
      }
      .nick-hint {
        margin: 0 0 18px;
        color: #7de9ff;
        font-size: 13px;
        font-weight: 800;
        text-align: center;
      }
      .nick-input {
        width: 100%;
        height: 54px;
        border: 1px solid rgba(48, 255, 159, 0.7);
        border-radius: 9px;
        outline: none;
        padding: 0 14px;
        color: #effcff;
        background: rgba(2, 8, 18, 0.92);
        box-shadow: 0 0 18px rgba(48, 255, 159, 0.16);
        font: 900 20px Inter, system-ui, sans-serif;
        text-align: center;
      }
      .nick-error {
        min-height: 20px;
        margin: 10px 0 12px;
        color: #ffd75e;
        font-size: 13px;
        font-weight: 850;
        text-align: center;
      }
      .nick-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .nick-actions button {
        height: 48px;
        border: 1px solid currentColor;
        border-radius: 8px;
        color: #effcff;
        background: rgba(5, 12, 28, 0.96);
        font: 900 15px Inter, system-ui, sans-serif;
        box-shadow: 0 0 16px rgba(125, 92, 255, 0.2);
      }
      #nickSave { color: #30ff9f; }
      #nickCancel { color: #8b7dff; }
    </style>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>

          nextPowerupScore = 230 + Math.random() * 170;
          state = "game";
        }

        function today() {
          return new Date().toISOString().slice(0, 10);
        }

        function dateKey(offset) {
          const d = new Date();
          d.setDate(d.getDate() + offset);
          return d.toISOString().slice(0, 10);
        }

        function canCollectDaily() {
          return progress.lastDaily !== today();
        }

        async function collectDaily() {
          if (!canCollectDaily()) return false;
          if (hasTelegramAuth()) {
            try {
              const data = await api("/api/daily/claim", { method: "POST", body: {} });
              applyServerProfile(data.profile);
              beep(data.claimed ? "buy" : "coin");
              return data.claimed;
            } catch {
              cloudReady = false;
            }
          }
          const yesterday = dateKey(-1);
          const nextStreak = progress.lastDaily === yesterday ? progress.streak + 1 : 1;
          progress.streak = nextStreak > DAILY_MAX ? 1 : nextStreak;
          progress.coins += 50;
          progress.lastDaily = today();
          save();
          beep("buy");
          return true;
        }

        function normalizeProgress(value) {
          const ids = skins.map((skin) => skin.id);
          const mapIds = maps.map((map) => map.id);
          const legacyMap = { gold: "ton", diamond: "xrp", ghost: "trx", bull: "sol" };
          const selectedRaw = legacyMap[value.selected] || value.selected;
          const unlocked = Array.isArray(value.unlocked)
            ? value.unlocked.map((id) => legacyMap[id] || id).filter((id) => ids.includes(id))
            : ["vt"];
          const unlockedMaps = Array.isArray(value.unlockedMaps) ? value.unlockedMaps.filter((id) => mapIds.includes(id)) : ["terminal"];
          if (!unlocked.includes("vt")) unlocked.unshift("vt");
          if (!unlockedMaps.includes("terminal")) unlockedMaps.unshift("terminal");
          const rawStreak = Math.max(0, Math.min(DAILY_MAX, Number(value.streak) || 0));
          const migratedStreak = rawStreak === 0 && value.lastDaily === today() ? 1 : rawStreak;
          const selectedMapRaw = mapIds.includes(value.selectedMap) ? value.selectedMap : "terminal";
          return {
            ...value,
            coins: Math.max(0, Number(value.coins) || 0),
            best: Math.max(0, Number(value.best) || 0),
            selected: ids.includes(selectedRaw) ? selectedRaw : "vt",
            unlocked: [...new Set(unlocked)],
            selectedMap: unlockedMaps.includes(selectedMapRaw) ? selectedMapRaw : "terminal",
            unlockedMaps: [...new Set(unlockedMaps)],
            streak: migratedStreak,
            lang: value.lang === "en" ? "en" : value.lang === "ru" ? "ru" : defaultLang,
            userId: currentUserId(),
            nickname: sanitizeNickname(value.nickname || telegramDisplayName())
          };
        }

        function setupTelegram() {
          if (!tg) return;
          tg.ready && tg.ready();
          tg.expand && tg.expand();
          tg.setHeaderColor && tg.setHeaderColor("#070914");
          tg.setBackgroundColor && tg.setBackgroundColor("#070914");
          tg.disableVerticalSwipes && tg.disableVerticalSwipes();
        }

        function currentUserId() {
          return tgUser && tgUser.id ? `tg-${tgUser.id}` : localUserId();
        }

        function telegramDisplayName() {
          if (!tgUser) return "";
          return sanitizeNickname(tgUser.username || tgUser.first_name || "");
        }

        function storageKey() {
          return `${KEY}:${currentUserId()}`;

          const map = { a: "\u0430", e: "\u0435", o: "\u043E", p: "\u0440", c: "\u0441", x: "\u0445", y: "\u0443", k: "\u043A", m: "\u043C", h: "\u043D", b: "\u0432", t: "\u0442", 0: "\u043E", 3: "\u0437", 4: "\u0447", 6: "\u0431" };

        async function api(path, options = {}) {
          if (!hasTelegramAuth()) throw new Error("telegram_auth_required");
          const response = await fetch(path, {
            method: options.method || "GET",
            headers: {
              "content-type": "application/json",
              "x-telegram-init-data": tg.initData
            },
            body: options.body ? JSON.stringify(options.body) : undefined
          });
          const data = await response.json().catch(() => ({}));
          if (!response.ok) throw new Error(data.error || "api_error");
          return data;
        }

        function applyServerProfile(profile) {
          if (!profile) return;
          progress.coins = Math.max(0, Number(profile.totalVtc) || 0);
          progress.best = Math.max(0, Number(profile.bestScore) || 0);
          progress.selected = skins.some((skin) => skin.id === profile.selectedSkin) ? profile.selectedSkin : progress.selected;
          progress.unlocked = Array.isArray(profile.unlockedSkins) && profile.unlockedSkins.length ? profile.unlockedSkins : progress.unlocked;
          progress.selectedMap = maps.some((map) => map.id === profile.selectedMap) ? profile.selectedMap : progress.selectedMap;
          progress.unlockedMaps = Array.isArray(profile.unlockedMaps) && profile.unlockedMaps.length ? profile.unlockedMaps : progress.unlockedMaps;
          progress.streak = Math.max(0, Math.min(DAILY_MAX, Number(profile.dailyStreak) || 0));
          progress.lastDaily = String(profile.lastDaily || "");
          progress.nickname = sanitizeNickname(profile.displayName || progress.nickname);
          cloudReady = true;
          save();
        }

        async function loadCloudProfile() {
          if (!hasTelegramAuth()) {
            bootLoading = false;
            return;

          try {
            const data = await api("/api/profile");
            applyServerProfile(data.profile);
            await loadLeaderboard();
          } catch (error) {
            cloudReady = false;
          } finally {
            bootLoading = false;
          }
        }

        async function loadLeaderboard() {
          try {
            const response = await fetch("/api/leaderboard");
            const data = await response.json();
            leaderboardCache = Array.isArray(data.rows) ? data.rows : [];

            return true;

        async function syncRun(scoreValue, vtcValue, durationMs) {
          if (!hasTelegramAuth() || syncBusy) return;
          syncBusy = true;
          try {
            const runToken = activeRunToken || (runTokenPromise ? await runTokenPromise : "");
            if (!runToken) throw new Error("run_token_missing");
            const data = await api("/api/run/submit", {
              method: "POST",
              body: {
                runId: `${currentUserId()}-${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 8)}`,
                runToken,
                score: Math.floor(scoreValue),
                vtc: Math.floor(vtcValue),
                durationMs: Math.max(1000, Math.floor(durationMs)),
                selectedSkin: progress.selected
              }
            });
            applyServerProfile(data.profile);
            await loadLeaderboard();
          } catch {
            cloudReady = false;
          } finally {
            activeRunToken = "";
            runTokenPromise = null;
            syncBusy = false;
          }
        }

              body: {
                selectedSkin: progress.selected,
                selectedMap: progress.selectedMap
              }

        function drawCoverImage(img, x, y, w, h) {
          const scale = Math.max(w / img.naturalWidth, h / img.naturalHeight);
          const sw = w / scale;
          const sh = h / scale;
          const sx = (img.naturalWidth - sw) / 2;

        function difficultyCurve() {
          const early = Math.min(1, score / 350);
          const mid = Math.min(1, Math.max(0, score - 350) / 1800);
          const late = Math.min(1, Math.max(0, score - 2150) / 5200);
          const elite = Math.min(1, Math.max(0, score - 7350) / 4800);
          const pressure = early * 0.26 + mid * 0.34 + late * 0.25 + elite * 0.15;
          return {
            speed: 205 + pressure * 162,
            gap: 330 - pressure * 84,
            spawn: 1780 - pressure * 470,
            margin: 248 - pressure * 20
          };
        }

        function beep(kind) {
          if (muted) return;
          const AudioCtx = window.AudioContext || window.webkitAudioContext;
          if (!AudioCtx) return;
          const ac = beep.ac || (beep.ac = new AudioCtx());
          const o = ac.createOscillator();
          const g = ac.createGain();
          const presets = {
            flap: [320, 620, 0.055, "triangle", 0.035],
            coin: [920, 1480, 0.07, "sine", 0.04],
            crash: [160, 52, 0.18, "sawtooth", 0.06],
            buy: [620, 1200, 0.13, "triangle", 0.05]
          };
          const p = presets[kind] || presets.flap;
          o.type = p[3];
          o.frequency.setValueAtTime(p[0], ac.currentTime);
          o.frequency.exponentialRampToValueAtTime(Math.max(1, p[1]), ac.currentTime + p[2]);
          g.gain.setValueAtTime(p[4], ac.currentTime);
          g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + p[2]);
          o.connect(g);
          g.connect(ac.destination);
          o.start();
          o.stop(ac.currentTime + p[2] + 0.01);
        }

          for (let i = 0; i < count; i += 1) {

            coins.push({ x: W + 210 + i * 46, y: center - Math.sin(t * Math.PI) * Math.min(46, gap * 0.18), r: 14, spin: 0 });

            ["slowmo", 0.13],
            ["double", 0.16],
            ["pump", 0.08]
          ];
          let roll = Math.random();
          let type = "super";
          for (const item of table) {
            roll -= item[1];
            if (roll <= 0) {
              type = item[0];
              break;
            }
          }
          powerups.push({ type, x, y: Math.max(116, Math.min(H - 126, y)), r: type === "super" || type === "pump" ? 24 : 21, spin: 0, pulse: Math.random() * Math.PI * 2 });
        }

        function update(dt) {
          if (state !== "game") return;
          const difficulty = difficultyCurve();
          tickEffects(dt);
          const pumpActive = effects.pump > 0;
          const slowFactor = effects.slowmo > 0 && !pumpActive ? 0.62 : 1;
          const pumpFactor = pumpActive ? 1.95 : 1;
          speed += (difficulty.speed - speed) * Math.min(1, dt * 1.8);
          const worldSpeed = speed * slowFactor * pumpFactor;
          score += worldSpeed * dt / 15.5;
          spawnTimer -= dt * 1000 * (pumpActive ? 1.25 : effects.slowmo > 0 ? 0.74 : 1);
          if (spawnTimer <= 0) {
            if (pumpActive) {
              spawnPumpCoins();
              spawnTimer = 520;
            } else {
              spawnPair();
              spawnTimer = difficulty.spawn;
            }
          }
          player.vy += (pumpActive ? 760 : 1130) * dt;
          if (pumpActive) {
            const targetY = H * 0.48;
            player.vy += ((targetY - player.y) * 1.05 - player.vy) * Math.min(1, dt * 1.25);
          }
          player.y += player.vy * dt;
          player.angle = Math.max(-0.42, Math.min(0.58, player.vy / 980));
          if (Math.random() < 0.85) {
            const s = selectedSkin();
            particles.push({ x: player.x - 46, y: player.y + (Math.random() - 0.5) * 18, vx: -90 - Math.random() * 70, vy: (Math.random() - 0.5) * 32, life: 0.35, c: s.trail, r: 5 + Math.random() * 4 });
          }
          if (pumpActive && Math.random() < 0.95) {
            particles.push({ x: player.x - 66, y: player.y + (Math.random() - 0.5) * 22, vx: -260 - Math.random() * 180, vy: (Math.random() - 0.5) * 44, life: 0.28 + Math.random() * 0.18, c: Math.random() > 0.45 ? "#ff7a30" : "#ffd75e", r: 6 + Math.random() * 8 });
          }
          stars.forEach((star) => {
            star.x -= star.s * dt;
            if (star.x < -8) { star.x = W + 8; star.y = Math.random() * H; }
          });
          obstacles.forEach((ob) => ob.x -= worldSpeed * dt);
          coins.forEach((coin) => {
            coin.x -= worldSpeed * dt;
            coin.spin += dt * 9;
            if (effects.magnet > 0) pullCoin(coin, dt);
          });
          powerups.forEach((p) => { p.x -= worldSpeed * dt; p.spin += dt * 7; p.pulse += dt * 5; });
          particles.forEach((p) => { p.x += p.vx * dt; p.y += p.vy * dt; p.life -= dt; });
          obstacles = obstacles.filter((ob) => ob.x > -120);
          coins = coins.filter((coin) => coin.x > -60);
          powerups = powerups.filter((p) => p.x > -70 && !p.hit);
          particles = particles.filter((p) => p.life > 0);

          for (const coin of coins) {
            if (obstacles.some((ob) => coinHitsObstacle(coin, ob))) {
              coin.hit = true;
              continue;
            }
            if (Math.hypot(player.x - coin.x, player.y - coin.y) < player.r + coin.r) {
              coin.hit = true;
              collectVtc(coin.x, coin.y, coin.value || 1);
            }
          }
          for (const p of powerups) {
            if (Math.hypot(player.x - p.x, player.y - p.y) < player.r + p.r) {
              p.hit = true;
              activatePowerup(p);
            }
          }
          coins = coins.filter((coin) => !coin.hit);
          powerups = powerups.filter((p) => !p.hit);

          const hit = pumpActive ? null : obstacles.find(hitObstacle);
          if (pumpActive) {
            player.y = Math.max(42, Math.min(H - 42, player.y));
          } else if (player.y < 32 || player.y > H - 32) {
            if (effects.shield > 0) breakShield();
            else crash();
          } else if (hit) {
            if (effects.shield > 0) breakShield(hit);
            else crash();
          }
        }

        function tickEffects(dt) {
          Object.keys(effects).forEach((key) => {
            effects[key] = Math.max(0, effects[key] - dt);
          });
        }

        function pullCoin(coin, dt) {
          const dx = player.x - coin.x;
          const dy = player.y - coin.y;
          const d = Math.max(1, Math.hypot(dx, dy));
          if (d > 210) return;
          const force = (1 - d / 230) * 820;
          coin.x += dx / d * force * dt;
          coin.y += dy / d * force * dt;
        }

        function collectVtc(x, y, value) {
          const bonus = effects.double > 0 ? 2 : 1;
          const earned = value * bonus;
          runCoins += earned;
          beep(value >= 10 ? "buy" : "coin");
          for (let i = 0; i < (value >= 10 ? 18 : 7); i += 1) {
            particles.push({ x, y, vx: -80 + Math.random() * 160, vy: -110 + Math.random() * 220, life: 0.26 + Math.random() * 0.16, c: value >= 10 ? "#ffd75e" : "#ffd75e", r: 2 + Math.random() * (value >= 10 ? 7 : 4) });
          }
        }

        function activatePowerup(p) {
          if (p.type === "super") {
            collectVtc(p.x, p.y, 35);
            return;
          }
          if (p.type === "pump") {
            effects.pump = Math.max(effects.pump || 0, 4.8);
            obstacles = [];
            spawnTimer = 260;
            player.vy = -240;
            beep("buy");
            for (let i = 0; i < 34; i += 1) {
              particles.push({ x: p.x, y: p.y, vx: -240 + Math.random() * 420, vy: -190 + Math.random() * 380, life: 0.42, c: Math.random() > 0.45 ? "#ff7a30" : "#ffd75e", r: 4 + Math.random() * 8 });
            }
            return;
          }
          const durations = { magnet: 7.5, shield: 6, slowmo: 5, double: 8 };
          effects[p.type] = Math.max(effects[p.type] || 0, durations[p.type] || 5);
          beep("buy");
          for (let i = 0; i < 18; i += 1) {
            particles.push({ x: p.x, y: p.y, vx: -120 + Math.random() * 240, vy: -120 + Math.random() * 240, life: 0.34, c: powerupColor(p.type), r: 3 + Math.random() * 6 });
          }
        }

        function breakShield(hit) {
          effects.shield = 0;
          impact = 10;
          player.y = Math.max(48, Math.min(H - 48, player.y));
          player.vy = -260;
          if (hit) obstacles.forEach((ob) => { if (Math.abs(ob.x - hit.x) < 90) ob.x = -999; });
          beep("crash");
          for (let i = 0; i < 26; i += 1) {
            particles.push({ x: player.x, y: player.y, vx: -180 + Math.random() * 360, vy: -180 + Math.random() * 360, life: 0.42, c: "#b9f8ff", r: 3 + Math.random() * 7 });
          }
        }

        function powerupColor(type) {
          return {
            super: "#ffd75e",
            magnet: "#2defff",
            shield: "#b9f8ff",
            slowmo: "#8b7dff",
            double: "#30ff9f",
            pump: "#ff7a30"
          }[type] || "#ffd75e";
        }

        function powerupLabel(type) {
          const ru = {
            super: "VTC",
            magnet: "МАГ",
            shield: "ЩИТ",
            slowmo: "СЛОУ",
            double: "x2",
            pump: "ПАМП"
          };
          const en = {
            super: "VTC",
            magnet: "MAG",
            shield: "SHD",
            slowmo: "SLOW",
            double: "x2",
            pump: "PUMP"
          };
          return (progress.lang === "ru" ? ru : en)[type] || "VTC";
        }

        function hitObstacle(ob) {
          const pad = 9;
          const left = ob.x - ob.w / 2 + pad;
          const right = ob.x + ob.w / 2 - pad;
          const top = ob.y + pad;
          const bottom = ob.y + ob.h - pad;
          const nx = Math.max(left, Math.min(player.x, right));
          const ny = Math.max(top, Math.min(player.y, bottom));
          return Math.hypot(player.x - nx, player.y - ny) < player.r;
        }

        function coinHitsObstacle(coin, ob) {
          const left = ob.x - ob.w / 2 - coin.r - 10;
          const right = ob.x + ob.w / 2 + coin.r + 10;
          const top = ob.y - coin.r - 10;
          const bottom = ob.y + ob.h + coin.r + 10;
          return coin.x >= left && coin.x <= right && coin.y >= top && coin.y <= bottom;
        }

        function crash() {
          const finalScore = Math.floor(score);
          const durationMs = performance.now() - runStartedAt;
          const oldBest = progress.best;
          const isNewBest = finalScore > oldBest;
          const line = gameOverLine();
          state = "over";
          impact = 16;
          progress.coins += runCoins;
          progress.best = Math.max(progress.best, finalScore);
          lastRun = { score: finalScore, vtc: runCoins, ath: progress.best, newBest: isNewBest, line };
          save();
          syncRun(finalScore, runCoins, durationMs);
          beep("crash");
        }

        function drawBg() {
          const map = selectedMap();
          const g = ctx.createLinearGradient(0, 0, 0, H);
          g.addColorStop(0, "#030712");
          g.addColorStop(0.48, map.id === "bear" ? "#160716" : map.id === "bull" ? "#041522" : map.id === "btccitadel" ? "#120d04" : "#061022");
          g.addColorStop(1, "#030711");
          ctx.fillStyle = g;
          ctx.fillRect(0, 0, W, H);
          const art = mapImage(map);
          if (art) {
            ctx.save();
            ctx.globalAlpha = state === "game" ? 0.48 : 0.62;
            drawCoverImage(art, 0, 0, W, H);
            ctx.globalAlpha = 1;
            const veil = ctx.createLinearGradient(0, 0, 0, H);
            veil.addColorStop(0, "rgba(3,7,18,.42)");
            veil.addColorStop(0.45, "rgba(3,7,18,.58)");
            veil.addColorStop(1, "rgba(3,7,18,.72)");
            ctx.fillStyle = veil;
            ctx.fillRect(0, 0, W, H);
            ctx.restore();
          }
          const scan = ctx.createLinearGradient(0, 0, W, H);
          scan.addColorStop(0, "rgba(0, 229, 255, .10)");
          scan.addColorStop(0.54, "rgba(125, 92, 255, .04)");
          scan.addColorStop(1, "rgba(255, 216, 86, .06)");
          ctx.fillStyle = scan;
          ctx.fillRect(0, 0, W, H);
          drawMapAtmosphere(map);
          ctx.strokeStyle = "rgba(33,79,120,.26)";
          ctx.lineWidth = 1;
          for (let x = 0; x <= W; x += 27) line(x, 0, x, H);
          for (let y = 0; y <= H; y += 27) line(0, y, W, y);
          ctx.strokeStyle = "rgba(45, 240, 255, .16)";
          for (let x = -60; x < W; x += 128) line(x, 0, x + 170, H);
          stars.forEach((s) => {
            ctx.globalAlpha = 0.55;
            ctx.fillStyle = s.c;
            circle(s.x, s.y, s.r);
          });
          ctx.globalAlpha = 1;
          drawCodeRain();
          drawMarketCandles(392, 135, 0.62);
          drawFarCoin();
        }

        function drawMapAtmosphere(map) {
          ctx.save();
          const t = (Number(score) || performance.now() / 60) * 0.01;
          if (mapImage(map)) {
            cardGlow(ctx, 270, 520, 420, `${map.accent}18`);
            ctx.strokeStyle = `${map.accent}66`;
            ctx.lineWidth = 2.4;
            ctx.beginPath();
            for (let x = 0; x <= W + 60; x += 36) {
              const y = 765 + Math.sin((x + t * 60) * 0.035) * 28 + Math.sin((x + t * 60) * 0.012) * 42;
              if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            }
            ctx.stroke();
            ctx.restore();
            return;
          }
          if (map.id === "bull") {
            cardGlow(ctx, 450, 760, 360, "rgba(48,255,159,.10)");
            drawMarketCandles(350, 132, 0.72);
            drawBullScene(270, 348, 410, 250, false);
            ctx.strokeStyle = "rgba(48,255,159,.34)";
          } else if (map.id === "bear") {
            cardGlow(ctx, 84, 320, 360, "rgba(255,69,100,.11)");
            drawEdgeCandles("#ff4564", 0.42);
            drawBearScene(270, 360, 420, 260, false);
            ctx.strokeStyle = "rgba(255,69,100,.32)";
          } else if (map.id === "liquidation") {
            cardGlow(ctx, 420, 260, 420, "rgba(255,69,215,.11)");
            drawCityCandles();
            drawLiquidationScene(280, 350, 420, 260, false);
            ctx.strokeStyle = "rgba(255,69,215,.27)";
          } else if (map.id === "ethprism") {
            cardGlow(ctx, 430, 310, 420, "rgba(139,125,255,.12)");
            drawPrismNetwork();
            drawEthPrismScene(160, 260, 310, 220, false);
            ctx.strokeStyle = "rgba(139,125,255,.30)";
          } else if (map.id === "btccitadel") {
            cardGlow(ctx, 270, 770, 460, "rgba(255,211,90,.12)");
            drawCitadel();
            drawBtcCitadelScene(270, 350, 420, 240, false);
            ctx.strokeStyle = "rgba(255,211,90,.26)";
          } else {
            drawTerminalCore();
            ctx.strokeStyle = "rgba(48,255,159,.28)";
          }
          ctx.lineWidth = 2.6;
          ctx.beginPath();
          for (let x = 0; x <= W + 60; x += 36) {
            const y = 760 + Math.sin((x + t * 60) * 0.035) * 30 + Math.sin((x + t * 60) * 0.012) * 46;
            if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
          }
          ctx.stroke();
          ctx.restore();
        }

        function drawRocket(x, y, scale, angle, skin, mode = "game") {
          ctx.save();
          ctx.translate(x, y);
          ctx.rotate(angle);
          ctx.scale(scale, scale);
          drawPremiumRocketBody(skin, mode);
          ctx.restore();
        }

        function drawGame() {
          drawBg();
          obstacles.forEach(drawCandle);
          coins.forEach(drawCoin);
          powerups.forEach(drawPowerup);
          particles.forEach((p) => {
            ctx.globalAlpha = Math.max(0, p.life / 0.35);
            circle(p.x, p.y, p.r, p.c);
            ctx.globalAlpha = 1;
          });
          drawRocketAura();
          drawRocket(player.x, player.y, 0.92, player.angle, selectedSkin());
          ctx.globalAlpha = 0.92;
          roundRect(22, 20, 496, 86, 14, "rgba(3,8,18,.78)");
          ctx.globalAlpha = 1;
          drawVTLogo(54, 62, 22);
          pill(127, 62, "PNL", String(Math.floor(score)), "#30ff9f");
          pill(292, 62, L("coins"), String(runCoins), "#ffd75e");
          pill(451, 62, "ATH", String(Math.max(progress.best, Math.floor(score))), "#7de9ff");
          drawPowerupHud();
        }

        function drawCandle(ob) {
          ctx.save();
          ctx.shadowColor = ob.c;
          ctx.shadowBlur = 24;
          roundRect(ob.x - ob.w / 2, ob.y, ob.w, ob.h, 7, "rgba(2,8,15,.9)");
          roundRect(ob.x - ob.w / 2 + 7, ob.y + 8, ob.w - 14, Math.max(0, ob.h - 16), 6, ob.c);
          ctx.shadowBlur = 0;
          ctx.globalAlpha = 0.24;
          roundRect(ob.x - ob.w / 2 + 15, ob.y + 18, 8, Math.max(0, ob.h - 36), 4, "#ffffff");
          ctx.globalAlpha = 0.28;
          for (let yy = ob.y + 28; yy < ob.y + ob.h - 18; yy += 34) {
            line(ob.x - 18, yy, ob.x + 20, yy + 9);
          }
          ctx.globalAlpha = 1;
          ctx.strokeStyle = ob.c;
          ctx.lineWidth = 4;
          line(ob.x, ob.y - 18, ob.x, ob.y + ob.h + 18);
          ctx.strokeStyle = "rgba(255,255,255,.22)";
          ctx.lineWidth = 1;
          roundedPath(ob.x - ob.w / 2 + 7, ob.y + 8, ob.w - 14, Math.max(0, ob.h - 16), 6);
          ctx.stroke();
          ctx.restore();
        }

        function drawCoin(c) {
          ctx.save();
          ctx.translate(c.x, c.y);
          ctx.scale(Math.max(0.32, Math.abs(Math.cos(c.spin))), 1);
          drawTinyCoin(0, 0, "#ffd75e", c.r);
          ctx.restore();
        }

        function drawPowerup(p) {
          const color = powerupColor(p.type);
          const pulse = 1 + Math.sin(p.pulse) * 0.06;
          ctx.save();
          ctx.translate(p.x, p.y);
          ctx.rotate(p.spin * 0.08);
          ctx.scale(pulse, pulse);
          ctx.shadowColor = color;
          ctx.shadowBlur = 24;
          if (p.type === "super") {
            drawTinyCoin(0, 0, "#ffd75e", 24);
            ctx.shadowBlur = 16;
            text("+35", 0, 40, 11, "#ffd75e", "950");
            ctx.restore();
            return;
          }
          if (p.type === "pump") {
            drawPumpCoin(0, 0, 25);
            ctx.shadowBlur = 18;
            text(powerupLabel(p.type), 0, 42, 11, "#ffb65e", "950");
            ctx.restore();
            return;
          }
          ctx.fillStyle = "rgba(3, 9, 22, .94)";
          ctx.strokeStyle = color;
          ctx.lineWidth = 3;
          ctx.beginPath();
          for (let i = 0; i < 6; i += 1) {
            const a = Math.PI / 6 + i * Math.PI / 3;
            const x = Math.cos(a) * 27;
            const y = Math.sin(a) * 27;
            if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
          }
          ctx.closePath();
          ctx.fill();
          ctx.stroke();
          ctx.shadowBlur = 0;
          ctx.strokeStyle = color;
          ctx.fillStyle = color;
          ctx.lineCap = "round";
          if (p.type === "magnet") {
            ctx.lineWidth = 6;
            ctx.beginPath();
            ctx.arc(0, -3, 13, Math.PI * 0.18, Math.PI * 0.82, true);
            ctx.stroke();
            line(-13, -2, -13, 11);
            line(13, -2, 13, 11);
          } else if (p.type === "shield") {
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(0, -17);
            ctx.lineTo(15, -9);
            ctx.lineTo(12, 8);
            ctx.quadraticCurveTo(0, 19, -12, 8);
            ctx.lineTo(-15, -9);
            ctx.closePath();
            ctx.stroke();
          } else if (p.type === "slowmo") {
            ctx.lineWidth = 4;
            circle(0, 0, 13, "rgba(139,125,255,.14)");
            ctx.beginPath();
            ctx.arc(0, 0, 13, -Math.PI / 2, Math.PI * 0.55);
            ctx.stroke();
            line(0, 0, 0, -9);
            line(0, 0, 9, 4);
          } else if (p.type === "double") {
            text("x2", 0, 1, 22, color, "950");
          }
          ctx.restore();
          text(powerupLabel(p.type), p.x, p.y + 42, 11, color, "950");
        }

        function drawRocketAura() {
          const t = performance.now() / 1000;
          ctx.save();
          if (effects.shield > 0) {
            ctx.globalAlpha = 0.28 + Math.sin(t * 10) * 0.06;
            ctx.strokeStyle = "#b9f8ff";
            ctx.lineWidth = 4;
            ctx.shadowColor = "#b9f8ff";
            ctx.shadowBlur = 24;
            ctx.beginPath();
            ctx.ellipse(player.x + 8, player.y, 70, 41, player.angle, 0, Math.PI * 2);
            ctx.stroke();
          }
          if (effects.magnet > 0) {
            ctx.globalAlpha = 0.18 + Math.sin(t * 7) * 0.05;
            ctx.strokeStyle = "#2defff";
            ctx.setLineDash([8, 10]);
            ctx.lineWidth = 2;
            ctx.shadowColor = "#2defff";
            ctx.shadowBlur = 18;
            ctx.beginPath();
            ctx.arc(player.x, player.y, 118 + Math.sin(t * 4) * 5, 0, Math.PI * 2);
            ctx.stroke();
            ctx.setLineDash([]);
          }
          if (effects.slowmo > 0) {
            ctx.globalAlpha = 0.2;
            ctx.fillStyle = "#8b7dff";
            for (let i = 0; i < 3; i += 1) {
              roundRect(player.x - 92 - i * 28, player.y - 23 + i * 17, 58, 5, 3, "#8b7dff");
            }
          }
          if (effects.double > 0) {
            ctx.globalAlpha = 0.9;
            ctx.shadowColor = "#30ff9f";
            ctx.shadowBlur = 16;
            roundRect(player.x + 45, player.y - 54, 45, 25, 8, "rgba(3,20,18,.88)");
            text("x2", player.x + 67, player.y - 41, 15, "#30ff9f", "950");
          }
          if (effects.pump > 0) {
            ctx.globalAlpha = 0.32 + Math.sin(t * 12) * 0.06;
            ctx.strokeStyle = "#ff7a30";
            ctx.lineWidth = 4;
            ctx.shadowColor = "#ffd75e";
            ctx.shadowBlur = 26;
            ctx.beginPath();
            ctx.ellipse(player.x + 4, player.y, 82, 44, player.angle, 0, Math.PI * 2);
            ctx.stroke();
            ctx.globalAlpha = 0.16;
            ctx.fillStyle = "#ff7a30";
            ctx.beginPath();
            ctx.moveTo(player.x - 50, player.y);
            ctx.lineTo(player.x - 150, player.y - 32);
            ctx.lineTo(player.x - 116, player.y);
            ctx.lineTo(player.x - 150, player.y + 32);
            ctx.closePath();
            ctx.fill();
          }
          ctx.restore();
          ctx.globalAlpha = 1;
        }

        function drawPowerupHud() {
          const active = Object.entries(effects).filter((entry) => entry[1] > 0 && entry[0] !== "super");
          if (!active.length) {
            text(L("flightLive"), 270, 126, 13, "#5f7d8b", "850");
            return;
          }
          const w = 78;
          const start = 270 - ((active.length * w) + ((active.length - 1) * 8)) / 2 + w / 2;
          active.forEach(([type, time], i) => {
            const x = start + i * (w + 8);
            const color = powerupColor(type);
            ctx.save();
            ctx.shadowColor = color;
            ctx.shadowBlur = 10;
            roundRect(x - w / 2, 113, w, 27, 9, "rgba(3,9,20,.86)");
            ctx.strokeStyle = color;
            ctx.lineWidth = 1.5;
            roundedPath(x - w / 2, 113, w, 27, 9);
            ctx.stroke();
            ctx.restore();
            text(`${powerupLabel(type)} ${Math.ceil(time)}`, x, 127, 11, color, "950");
          });
        }

        function drawTinyCoin(x, y, color, r = 15) {
          circle(x, y, r, color);
          ctx.strokeStyle = "#fff5b3";
          ctx.lineWidth = Math.max(2, r * 0.2);
          ctx.beginPath();
          ctx.arc(x, y, r - 4, 0, Math.PI * 2);
          ctx.stroke();
          const inner = ctx.createLinearGradient(x - r, y - r, x + r, y + r);
          inner.addColorStop(0, "#19e8ff");
          inner.addColorStop(0.55, "#2477ff");
          inner.addColorStop(1, "#8b5cff");
          ctx.strokeStyle = inner;
          ctx.lineWidth = Math.max(1.5, r * 0.14);
          ctx.beginPath();
          ctx.arc(x, y, r * 0.48, -0.2, Math.PI * 1.72);
          ctx.stroke();

        function drawPumpCoin(x, y, r = 25) {
          const grad = ctx.createRadialGradient(x - r * 0.35, y - r * 0.45, r * 0.1, x, y, r);
          grad.addColorStop(0, "#fff3a6");
          grad.addColorStop(0.5, "#ffb13d");
          grad.addColorStop(1, "#b74b15");
          circle(x, y, r, grad);
          ctx.strokeStyle = "#fff1a2";
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.arc(x, y, r - 4, 0, Math.PI * 2);
          ctx.stroke();
          ctx.fillStyle = "#ffd35a";
          ctx.beginPath();
          ctx.moveTo(x - 12, y - 8);
          ctx.quadraticCurveTo(x, y - 25, x + 15, y - 8);
          ctx.quadraticCurveTo(x + 5, y - 13, x - 12, y - 8);
          ctx.fill();
          ctx.fillStyle = "#1a1320";
          ctx.beginPath();
          ctx.arc(x - 7, y - 1, 2, 0, Math.PI * 2);
          ctx.arc(x + 7, y - 1, 2, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = "#1a1320";
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(x, y + 8, 8, 0.1, Math.PI - 0.1);
          ctx.stroke();

        function leaderboardRows() {
          const best = Math.floor(progress.best);
          if (leaderboardCache.length) {
            const myName = displayName().toLowerCase();
            const remote = leaderboardCache.map((row) => ({
              name: sanitizeNickname(row.displayName || row.name || "Pilot"),
              score: Math.max(0, Math.floor(Number(row.bestScore ?? row.score) || 0))
            }));
            remote.forEach((row) => {
              if (row.name.toLowerCase() === myName && row.score === best) row.me = true;
            });
            if (!remote.some((row) => row.me)) remote.push({ name: displayName(), score: best, me: true });
            const unique = [];
            const seen = new Set();
            for (const row of remote.sort((a, b) => b.score - a.score)) {
              const key = row.me ? "me" : row.name.toLowerCase();
              if (seen.has(key)) continue;
              seen.add(key);
              unique.push(row);
            }
            return unique.slice(0, 15);
          }
          const base = Math.max(best, 840);
          const rows = [
            { name: "Pulse", score: base + 780 },
            { name: "Neon", score: base + 620 },
            { name: "Candle", score: base + 510 },
            { name: "Rocket", score: base + 390 },
            { name: "Whale", score: base + 260 },
            { name: "Scalper", score: base + 160 },
            { name: "Breakout", score: base + 80 },
            { name: displayName(), score: best, me: true },
            { name: "Moon", score: Math.max(0, base - 110) },
            { name: "Funding", score: Math.max(0, base - 220) },
            { name: "Wick", score: Math.max(0, base - 330) },
            { name: "Trend", score: Math.max(0, base - 440) },
            { name: "Degen", score: Math.max(0, base - 550) },
            { name: "Hodler", score: Math.max(0, base - 660) },
            { name: "Ghost", score: Math.max(0, base - 770) }
          ];
          return rows.sort((a, b) => b.score - a.score);
        }

              const data = await api(owned ? "/api/skin/select" : "/api/skin/buy", {
                method: "POST",
                body: { skinId: skin.id }
              });
              applyServerProfile(data.profile);
              beep("buy");
              return;
            } catch {
              impact = 8;
              beep("crash");
              return;
            }
          }
          if (owned) {
            progress.selected = skin.id;
            save();
            beep("buy");
          } else if (progress.coins >= skin.price) {
            progress.coins -= skin.price;
            progress.unlocked.push(skin.id);
            progress.selected = skin.id;
            save();
            beep("buy");

            beep("crash");

        }

          } else if (state === "over") {

        async function share() {
          const data = lastRun.score ? lastRun : { score: Math.floor(score), vtc: runCoins, ath: progress.best, newBest: false, line: gameOverLine() };
          const pilot = displayName();
          const message = data.newBest
            ? `Fomo Flight: ${pilot} hit NEW ATH ${data.ath} PNL and earned +${data.vtc} VTC. Can you beat it?\n@FomoFlightBot`
            : `Fomo Flight: ${pilot} scored ${data.score} PNL, earned +${data.vtc} VTC. Can you beat my ATH ${data.ath}?\n@FomoFlightBot`;
          const appLink = miniAppLink;
          const storyText = storyShareText(data, pilot);
          const shareUrl = `https://t.me/share/url?url=${encodeURIComponent(appLink)}&text=${encodeURIComponent(message)}`;
          const card = createShareCard(data);
          try {
            const blob = await new Promise((resolve) => card.toBlob(resolve, "image/jpeg", 0.9));
            if (tg && tg.shareToStory && hasTelegramAuth()) {
              const storyMediaUrl = new URL("assets/story/fomo-story.jpg", location.href).href;
              try {
                await fetch(storyMediaUrl, { method: "GET", cache: "no-store" });
              } catch {}
              tg.shareToStory(storyMediaUrl, {
                text: storyText
              });
              beep("buy");
              return;
            }
            const file = new File([blob], data.newBest ? "fomo-flight-new-ath.jpg" : "fomo-flight-run.jpg", { type: "image/jpeg" });
            if (navigator.canShare && navigator.canShare({ files: [file] })) {
              await navigator.share({ title: "Fomo Flight", text: message, files: [file] });
            } else if (navigator.share) {
              await navigator.share({ title: "Fomo Flight", text: message, url: appLink });
            } else {
              const imageUrl = URL.createObjectURL(blob);
              window.open(imageUrl, "_blank");
            }
          } catch (error) {
            if (error && error.name === "AbortError") return;
            if (tg && tg.openTelegramLink) tg.openTelegramLink(shareUrl);
            else window.open(shareUrl, "_blank");
          }
          beep("buy");
        }

        function storyShareText(data, pilot) {
          const line1 = data.newBest ? `NEW ATH: ${data.ath} PNL` : `${pilot}: ${data.score} PNL`;
          const line2 = data.newBest ? `+${data.vtc} VTC earned` : `+${data.vtc} VTC | ATH ${data.ath}`;
          const line3 = data.newBest ? "Can you beat this flight?" : "Can you beat my flight?";
          return `${line1}\n${line2}\n${line3}\n@FomoFlightBot | t.me/FomoFlightBot`.slice(0, 190);
        }

        function createShareCard(run) {
          const card = document.createElement("canvas");
          const storyScale = 2 / 3;
          card.width = 720;
          card.height = 1280;
          const c = card.getContext("2d");
          c.scale(storyScale, storyScale);
          const victory = run.newBest;
          const skin = selectedSkin();
          const bg = c.createLinearGradient(0, 0, 0, 1920);
          bg.addColorStop(0, "#030712");
          bg.addColorStop(0.48, "#071329");
          bg.addColorStop(1, "#040613");
          c.fillStyle = bg;
          c.fillRect(0, 0, 1080, 1920);

          cardGlow(c, 250, 140, 460, victory ? "rgba(0,255,180,.18)" : "rgba(255,60,98,.16)");
          cardGlow(c, 830, 420, 520, "rgba(0,218,255,.13)");
          cardGlow(c, 540, 1600, 560, "rgba(125,92,255,.16)");
          drawCardGrid(c);
          drawCardMarket(c, victory);
          drawCardCoins(c, victory);

          cardText(c, "VT VIBES", 540, 124, 44, "#effcff", 950);
          cardText(c, "crypto arcade flight", 540, 170, 23, "#7de9ff", 800);
          cardText(c, "FOMO FLIGHT", 540, 250, 88, "#effcff", 950, true);

        function drawCardRocket(c, x, y, scale, angle, skin, victory) {
          c.save();
          c.translate(x, y);
          c.rotate(angle);
          c.scale(scale, scale);
          c.shadowColor = skin.trail;
          c.shadowBlur = 24;
          c.fillStyle = skin.trim;
          cardPath(c, [[-35, -22], [-70, -42], [-10, -38], [20, -18]]);
          cardPath(c, [[-35, 22], [-70, 42], [-10, 38], [20, 18]]);
          const metal = c.createLinearGradient(-70, -35, 80, 35);
          metal.addColorStop(0, "#07111f");
          metal.addColorStop(0.28, skin.body);
          metal.addColorStop(0.55, "#101827");
          metal.addColorStop(0.78, "#dce8ff");
          metal.addColorStop(1, "#070b14");
          c.fillStyle = metal;
          c.beginPath();
          c.moveTo(-58, -23);
          c.bezierCurveTo(-28, -45, 38, -43, 80, -12);
          c.bezierCurveTo(92, -3, 92, 3, 80, 12);
          c.bezierCurveTo(38, 43, -28, 45, -58, 23);
          c.bezierCurveTo(-76, 8, -76, -8, -58, -23);
          c.closePath();
          c.fill();
          c.shadowBlur = 0;
          c.strokeStyle = "rgba(239,252,255,.78)";
          c.lineWidth = 2.2;
          c.stroke();
          c.strokeStyle = skin.accent;
          c.lineWidth = 5;
          c.beginPath();
          c.moveTo(-50, -19);
          c.bezierCurveTo(-18, -34, 28, -30, 58, -11);
          c.stroke();
          c.beginPath();
          c.moveTo(-48, 20);
          c.bezierCurveTo(-20, 34, 28, 29, 51, 12);
          c.stroke();
          cardCircle(c, -18, 0, 29, "#06101c");
          c.strokeStyle = "#2477ff";
          c.lineWidth = 7;
          c.beginPath();
          c.arc(-18, 0, 29, 0, Math.PI * 2);
          c.stroke();
          cardText(c, skin.market, -18, 2, skin.market.length > 3 ? 13 : 16, skin.accent, 950);
          cardRound(c, 34, -20, 36, 40, 15, "rgba(4,10,18,.94)");
          cardRound(c, 52, -9, 8, 18, 5, skin.cockpit);
          cardRound(c, -78, -17, 22, 34, 7, "#07101b");
          for (let i = 0; i < 12; i += 1) {
            c.globalAlpha = 0.75 - i * 0.045;
            c.fillStyle = i % 2 ? "#8b5cff" : skin.trail;
            c.fillRect(-92 - i * 16, -10 + Math.sin(i) * 11, 40, 5);
          }
          c.globalAlpha = 1;
          cardRound(c, -70, 34, 34, 42, 7, "rgba(5,16,30,.96)");
          cardText(c, "VT", -53, 55, 14, "#45f4ff", 950);
          if (victory) {
            c.strokeStyle = "#30ff9f";
            c.lineWidth = 2;
            for (let i = 0; i < 5; i += 1) {
              c.beginPath();
              c.arc(-18, 0, 48 + i * 12, -0.4, 0.4);
              c.stroke();
            }
          }
          c.restore();
        }

        function drawCardGrid(c) {
          c.save();
          c.strokeStyle = "rgba(33,79,120,.24)";
          c.lineWidth = 1;
          for (let x = 0; x <= 1080; x += 54) cardLine(c, x, 0, x, 1920);
          for (let y = 0; y <= 1920; y += 54) cardLine(c, 0, y, 1080, y);
          c.strokeStyle = "rgba(45,240,255,.10)";
          for (let x = -160; x < 1080; x += 210) cardLine(c, x, 0, x + 360, 1920);
          c.restore();
        }

        function drawCardMarket(c, victory) {
          c.save();
          const colors = victory ? ["#30ff9f", "#00d9ff", "#7d6cff"] : ["#ff4564", "#7d6cff", "#00d9ff"];
          for (let i = 0; i < 12; i += 1) {
            const x = 620 + i * 34;
            const h = 70 + Math.sin(i * 1.2) * 35 + (victory ? i * 8 : (11 - i) * 7);
            const y = 485 - h * 0.35;
            c.strokeStyle = colors[i % colors.length] + "88";
            c.lineWidth = 5;
            cardLine(c, x, y - 38, x, y + h + 38);
            cardRound(c, x - 13, y, 26, h, 4, colors[i % colors.length] + "66");
          }
          c.strokeStyle = victory ? "rgba(48,255,159,.46)" : "rgba(255,69,100,.42)";
          c.lineWidth = 5;
          c.beginPath();
          for (let x = 40; x <= 1040; x += 80) {
            const y = 1520 + Math.sin(x * 0.015) * 80 + (victory ? -x * 0.18 : x * 0.08);
            if (x === 40) c.moveTo(x, y); else c.lineTo(x, y);
          }
          c.stroke();
          c.restore();
        }

        function drawCardCoins(c, victory) {
          const pts = victory
            ? [[210, 660, 34], [850, 650, 38], [170, 990, 28], [900, 1000, 30], [330, 1520, 26], [760, 1545, 30]]
            : [[190, 760, 30], [860, 610, 34], [170, 1160, 26], [920, 1130, 30], [340, 1555, 24], [770, 1530, 28]];
          pts.forEach(([x, y, r], i) => {
            c.save();
            c.globalAlpha = 0.9;
            c.translate(x, y);
            c.rotate(i * 0.3);
            c.scale(0.7 + (i % 3) * 0.12, 1);
            cardCoin(c, 0, 0, r);
            c.restore();
          });
        }

        function drawCardImpact(c, x, y) {
          c.save();
          for (let i = 0; i < 20; i += 1) {
            const a = i * 0.62;
            const len = 50 + (i % 5) * 18;
            c.strokeStyle = i % 2 ? "#ffd75e" : "#ff4564";
            c.globalAlpha = 0.7;
            c.lineWidth = 4;
            cardLine(c, x, y, x + Math.cos(a) * len, y + Math.sin(a) * len);
          }
          c.restore();
        }

        function cardCoin(c, x, y, r) {
          cardCircle(c, x, y, r, "#ffd75e");
          c.strokeStyle = "#fff5b3";
          c.lineWidth = 5;
          c.beginPath();
          c.arc(x, y, r - 8, 0, Math.PI * 2);
          c.stroke();
          c.strokeStyle = "#2477ff";
          c.lineWidth = 4;
          c.beginPath();
          c.arc(x, y, r * 0.48, -0.2, Math.PI * 1.72);
          c.stroke();
          cardText(c, "VT", x, y + 1, Math.floor(r * 0.58), "#092032", 950);
        }

        function cardGlow(c, x, y, r, color) {
          const g = c.createRadialGradient(x, y, 0, x, y, r);
          g.addColorStop(0, color);
          g.addColorStop(1, "rgba(0,0,0,0)");
          c.fillStyle = g;
          c.fillRect(0, 0, 1080, 1920);
        }

        function cardText(c, s, x, y, size, color, weight, stroke = false) {
          c.save();
          c.font = `${weight || 800} ${size}px Inter, system-ui, sans-serif`;
          c.textAlign = "center";
          c.textBaseline = "middle";
          if (stroke) {
            c.shadowColor = "rgba(0,229,255,.45)";
            c.shadowBlur = 18;
            c.lineWidth = Math.max(4, size * 0.08);
            c.strokeStyle = "rgba(3,8,18,.95)";
            c.strokeText(String(s), x, y);
          }
          c.fillStyle = color;
          c.fillText(String(s), x, y);
          c.restore();
        }

        function cardRound(c, x, y, w, h, r, fill) {
          cardRoundedPath(c, x, y, w, h, r);
          c.fillStyle = fill;
          c.fill();
        }

        function cardRoundedPath(c, x, y, w, h, r) {
          c.beginPath();
          c.moveTo(x + r, y);
          c.arcTo(x + w, y, x + w, y + h, r);
          c.arcTo(x + w, y + h, x, y + h, r);
          c.arcTo(x, y + h, x, y, r);
          c.arcTo(x, y, x + w, y, r);
          c.closePath();
        }

        function cardCircle(c, x, y, r, fill) {
          c.fillStyle = fill;
          c.beginPath();
          c.arc(x, y, r, 0, Math.PI * 2);
          c.fill();
        }

        function cardLine(c, x1, y1, x2, y2) {
          c.beginPath();
          c.moveTo(x1, y1);
          c.lineTo(x2, y2);
          c.stroke();
        }

        function cardPath(c, points) {
          c.beginPath();
          c.moveTo(points[0][0], points[0][1]);
          points.slice(1).forEach((p) => c.lineTo(p[0], p[1]));
          c.closePath();
          c.fill();
        }

          modalMode = "nickname";
          nickTitle.textContent = L("nicknameTitle");
          nickHint.textContent = L("nicknameHint");

          nickCancel.textContent = L("nicknameCancel");
          nickError.textContent = "";

          nickModal.hidden = false;
          setTimeout(() => {

        function askPromo() {
          modalMode = "promo";
          nickTitle.textContent = L("promo");
          nickHint.textContent = L("promoHint");
          nickSave.textContent = L("promoButton");
          nickCancel.textContent = L("nicknameCancel");
          nickError.textContent = "";
          nickInput.maxLength = 24;
          nickInput.value = "";
          nickModal.hidden = false;
          setTimeout(() => {
            nickInput.focus();
            nickInput.select();
          }, 40);
        }

        function closeNicknameModal() {
          nickModal.hidden = true;
          nickError.textContent = "";
          canvas.focus && canvas.focus();
        }

        async function saveNicknameFromModal() {
          if (modalMode === "promo") return redeemPromoFromModal();
          const problem = nicknameProblem(nickInput.value);
          if (problem) {
            nickError.textContent = L(problem);
            return;
          }
          const previous = progress.nickname;
          progress.nickname = sanitizeNickname(nickInput.value);
          save();
          const ok = await syncNickname();
          if (ok) closeNicknameModal();
          else {
            progress.nickname = previous;
            save();
          }
        }

        async function redeemPromoFromModal() {
          const code = String(nickInput.value || "").trim();
          if (!code) {
            nickError.textContent = L("promoInvalid");
            return;
          }
          if (!hasTelegramAuth()) {
            nickError.textContent = L("promoNeedTg");
            return;
          }
          try {
            const data = await api("/api/promo/redeem", { method: "POST", body: { code } });
            applyServerProfile(data.profile);
            promoStatus = L("promoApplied");
            nickError.textContent = `${L("promoApplied")} +${data.reward || 0} VTC`;
            beep("buy");
          } catch (error) {
            const key = error.message === "promo_limit" ? "promoLimit" : "promoInvalid";
            promoStatus = L(key);
            nickError.textContent = L(key);
            beep("crash");
          }
        }

        function drawRocketFins(skin, spec) {
          ctx.fillStyle = skin.trim;
          if (spec.body === "halo") {
            ctx.strokeStyle = skin.accent;
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.arc(-35, 0, 43, -0.76, 0.76);
            ctx.stroke();
            ctx.fillStyle = skin.trim;
          }
          if (spec.body === "delta") {
            path([[-38, -21], [-72, -30], [-8, -39], [18, -17]]);
            path([[-38, 21], [-72, 30], [-8, 39], [18, 17]]);
          } else if (spec.body === "blade" || spec.body === "silver") {
            path([[-38, -19], [-79, -15], [-22, -48], [16, -18]]);
            path([[-38, 19], [-79, 15], [-22, 48], [16, 18]]);
          } else if (spec.body === "spear" || spec.body === "armor") {
            path([[-36, -20], [-78, -50], [-30, -33], [15, -18]]);
            path([[-36, 20], [-78, 50], [-30, 33], [15, 18]]);
          } else if (spec.body === "forge" || spec.body === "crown") {
            path([[-38, -21], [-75, -38], [-44, -43], [-14, -36], [18, -18]]);
            path([[-38, 21], [-75, 38], [-44, 43], [-14, 36], [18, 18]]);
          } else if (spec.body === "comet") {
            path([[-36, -20], [-78, -30], [-51, -6], [15, -17]]);
            path([[-36, 20], [-78, 30], [-51, 6], [15, 17]]);
          } else if (spec.body === "frog") {
            path([[-35, -20], [-67, -43], [-43, -17], [-8, -39], [16, -18]]);
            path([[-35, 20], [-67, 43], [-43, 17], [-8, 39], [16, 18]]);
          } else if (spec.body === "hex") {
            path([[-36, -21], [-68, -33], [-40, -49], [-7, -36], [16, -18]]);
            path([[-36, 21], [-68, 33], [-40, 49], [-7, 36], [16, 18]]);
          } else if (spec.body === "prism" || spec.body === "flare") {
            path([[-35, -19], [-61, -49], [-17, -42], [20, -18]]);
            path([[-35, 19], [-61, 49], [-17, 42], [20, 18]]);
          } else {
            path([[-34, -23], [-64, -45], [-12, -41], [15, -19]]);

          ctx.strokeStyle = "#e9f7ff";

        function drawRocketCore(skin, spec) {
          ctx.fillStyle = "#06101c";
          circle(-19, 0, spec.core);
          ctx.strokeStyle = "#111827";
          ctx.lineWidth = 8;
          ctx.beginPath();
          ctx.arc(-19, 0, spec.core + 2, 0, Math.PI * 2);

          ring.addColorStop(0, "#20f2ff");
          ring.addColorStop(0.55, skin.id === "btc" ? "#ffc247" : "#2477ff");
          ring.addColorStop(1, skin.id === "pepe" ? "#78ff4a" : "#8b5cff");
          ctx.strokeStyle = ring;
          ctx.lineWidth = 4;
          ctx.beginPath();
          ctx.arc(-19, 0, spec.core, 0, Math.PI * 2);
          ctx.stroke();

          if (drawSkinCoreIcon(skin, -19, 0, spec.core)) {

            roundRect(-20, -2, 7, 20, 3, skin.accent);

        function drawRocketDetails(skin, spec) {
          ctx.strokeStyle = skin.accent;
          ctx.lineWidth = 4;
          ctx.beginPath();
          ctx.moveTo(-48, -19);
          ctx.bezierCurveTo(-26, -28, 20, -32, 55, -11);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(-46, 20);
          ctx.bezierCurveTo(-24, 30, 15, 31, 45, 15);
          ctx.stroke();

          ctx.strokeStyle = "rgba(125,92,255,.9)";
          ctx.lineWidth = 2;
          line(11, 27, 21, 18);
          line(21, 18, 29, 22);
          line(29, 22, 39, 10);

          if (spec.ridge > 0) {
            ctx.strokeStyle = `${skin.accent}aa`;
            ctx.lineWidth = 1.8;
            for (let i = 0; i < spec.ridge; i += 1) {
              const x = -2 + i * 15;
              line(x, -25 + i * 2, x + 16, -16 + i * 2);
              line(x - 3, 25 - i * 2, x + 13, 16 - i * 2);
            }
          }
          if (spec.body === "hex") {
            ctx.strokeStyle = `${skin.accent}cc`;
            ctx.lineWidth = 2;
            for (let i = 0; i < 3; i += 1) {
              const x = 7 + i * 12;
              ctx.beginPath();
              ctx.moveTo(x, -8);
              ctx.lineTo(x + 6, -4);
              ctx.lineTo(x + 6, 4);
              ctx.lineTo(x, 8);
              ctx.lineTo(x - 6, 4);
              ctx.lineTo(x - 6, -4);
              ctx.closePath();
              ctx.stroke();
            }
          }
          if (spec.body === "prism") {
            ctx.strokeStyle = "rgba(239,252,255,.54)";
            ctx.lineWidth = 1.5;
            line(-1, -27, 28, 0);
            line(28, 0, -1, 27);
            line(17, -21, 44, -6);
          }
          if (spec.body === "crown") {
            ctx.fillStyle = "#ffd75e";
            path([[-3, -31], [6, -42], [15, -30], [25, -43], [35, -28], [17, -25]]);
          }
          if (spec.body === "pulse") {
            ctx.strokeStyle = `${skin.accent}88`;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(-19, 0, 34, -0.65, 0.65);
            ctx.stroke();

            ctx.strokeStyle = "#fff08a";
            line(7, -34, 48, -34);
          } else if (skin.id === "eth") {

          } else if (skin.id === "sol") {

            ctx.strokeStyle = skin.body;
            line(-20, -39, 54, -28);
            line(-20, 39, 54, 28);
          } else if (skin.id === "link") {
            ctx.strokeStyle = skin.accent;
            for (let i = 0; i < 3; i += 1) {
              const x = 1 + i * 17;
              ctx.beginPath();
              ctx.moveTo(x, -34);
              ctx.lineTo(x + 9, -29);
              ctx.lineTo(x + 9, -18);
              ctx.lineTo(x, -13);
              ctx.lineTo(x - 9, -18);
              ctx.lineTo(x - 9, -29);
              ctx.closePath();
              ctx.stroke();

          } else if (skin.id === "pepe") {
            ctx.fillStyle = "rgba(120,255,74,.44)";

            circle(47, 24, 6);
          } else if (skin.id === "doge") {

          } else if (["trx", "avax"].includes(skin.id)) {
            ctx.strokeStyle = skin.accent;

        function drawSkinCoreIcon(skin, x, y, r) {
          if (!["doge", "pepe", "eth", "btc", "sol", "bnb", "link"].includes(skin.id)) return false;
          ctx.save();
          ctx.translate(x, y);
          if (skin.id === "doge") {
            circle(0, 0, r * 0.66, "#f6d48a");
            ctx.fillStyle = "#07101b";
            circle(-7, -4, 3.2);
            circle(7, -4, 3.2);
            ctx.strokeStyle = "#7a4c00";
            ctx.lineWidth = 2.2;
            ctx.beginPath();
            ctx.arc(0, 5, 8, 0.1, Math.PI - 0.1);
            ctx.stroke();
          } else if (skin.id === "pepe") {
            circle(0, 0, r * 0.68, "#83ff4a");
            ctx.fillStyle = "#07101b";
            circle(-8, -5, 3.6);
            circle(8, -5, 3.6);
            ctx.strokeStyle = "#07101b";
            ctx.lineWidth = 2.4;
            ctx.beginPath();
            ctx.arc(0, 5, 9, 0.12, Math.PI - 0.12);
            ctx.stroke();
          } else if (skin.id === "eth") {
            ctx.fillStyle = "#dce5ff";
            path([[0, -15], [10, 1], [0, 7], [-10, 1]]);
            ctx.fillStyle = "#8b7dff";
            path([[0, 10], [10, 4], [0, 17], [-10, 4]]);
          } else if (skin.id === "btc") {
            ctx.fillStyle = "#ffd75e";
            path([[-13, -12], [-3, -20], [5, -12], [15, -18], [10, -5], [-10, -5]]);
            ctx.font = "950 19px Inter, system-ui, sans-serif";
            ctx.fillStyle = "#ffd75e";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText("B", 0, 7);
          } else if (skin.id === "sol") {
            ctx.fillStyle = "#22ffd0";
            roundRect(-12, -11, 24, 5, 3, "#22ffd0");
            roundRect(-8, -2, 24, 5, 3, "#8b5cff");
            roundRect(-12, 7, 24, 5, 3, "#ff45d7");
          } else if (skin.id === "bnb") {
            ctx.fillStyle = "#ffd75e";
            path([[0, -13], [8, -5], [0, 3], [-8, -5]]);
            path([[-11, 0], [-5, 6], [-11, 12], [-17, 6]]);
            path([[11, 0], [17, 6], [11, 12], [5, 6]]);
            path([[0, 6], [7, 13], [0, 20], [-7, 13]]);
          } else if (skin.id === "link") {
            ctx.strokeStyle = "#8aa8ff";
            ctx.lineWidth = 3;
            ctx.beginPath();
            for (let i = 0; i < 6; i += 1) {
              const a = Math.PI / 6 + i * Math.PI / 3;
              const px = Math.cos(a) * 13;
              const py = Math.sin(a) * 13;
              if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
            }
            ctx.closePath();
            ctx.stroke();
            circle(0, 0, 4, "#8aa8ff");
          }
          ctx.restore();
          return true;
        }

        function drawMarketIcon(skin, x, y, r) {
          ctx.save();
          ctx.translate(x, y);
          const s = r / 18;
          ctx.scale(s, s);
          if (drawSkinCoreIcon(skin, 0, 0, 24)) {
            ctx.restore();
            return;
          }
          ctx.font = `950 ${Math.max(8, Math.floor(18 * (skin.market.length > 3 ? 0.72 : 0.86)))}px Inter, system-ui, sans-serif`;
          ctx.fillStyle = "#07101b";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText(skin.market, 0, 1);
          ctx.restore();
        }

        function mapDescription(map) {
          const ru = {
            terminal: "чистый VT терминал",
            bull: "зелёный импульс",
            bear: "красная ловушка",
            ethprism: "фиолетовая сеть",
            liquidation: "город ликвидаций",
            btccitadel: "золотая цитадель"
          };
          const en = {
            terminal: "clean VT terminal",
            bull: "green momentum",
            bear: "red market trap",
            ethprism: "violet prism net",
            liquidation: "liquidation city",
            btccitadel: "legendary gold vault"
          };
          return (progress.lang === "ru" ? ru : en)[map.id] || "market map";
        }

        function drawMapPreview(x, y, w, h, map) {
          ctx.save();
          ctx.shadowColor = map.accent;
          ctx.shadowBlur = 16;
          roundRect(x - w / 2, y - h / 2, w, h, 12, "#050b17");
          ctx.save();
          ctx.beginPath();
          roundedPath(x - w / 2, y - h / 2, w, h, 12);
          ctx.clip();
          const art = mapImage(map);
          if (art) {
            drawCoverImage(art, x - w / 2, y - h / 2, w, h);
            const shade = ctx.createLinearGradient(x - w / 2, y - h / 2, x + w / 2, y + h / 2);
            shade.addColorStop(0, "rgba(3,7,18,.10)");
            shade.addColorStop(0.72, "rgba(3,7,18,.22)");
            shade.addColorStop(1, "rgba(3,7,18,.58)");
            ctx.fillStyle = shade;
            ctx.fillRect(x - w / 2, y - h / 2, w, h);
          } else {
            drawMapScene(x, y, w, h, map, true);
          }
          ctx.restore();
          ctx.shadowBlur = 0;
          ctx.strokeStyle = map.accent;
          ctx.lineWidth = 2;
          roundedPath(x - w / 2, y - h / 2, w, h, 12);
          ctx.stroke();
          ctx.restore();
        }

        function drawMapScene(x, y, w, h, map, preview = false) {
          const left = x - w / 2;
          const top = y - h / 2;
          const g = ctx.createLinearGradient(left, top, left + w, top + h);
          g.addColorStop(0, "#030712");
          g.addColorStop(0.56, map.id === "bull" ? "#05291b" : map.id === "bear" ? "#260716" : map.id === "btccitadel" ? "#2a1b05" : map.id === "liquidation" ? "#190722" : "#071329");
          g.addColorStop(1, "#030711");
          ctx.fillStyle = g;
          ctx.fillRect(left, top, w, h);
          ctx.globalAlpha = preview ? 0.28 : 0.18;
          ctx.strokeStyle = "rgba(84,154,210,.48)";
          ctx.lineWidth = 1;
          for (let gx = left; gx <= left + w; gx += preview ? 20 : 36) line(gx, top, gx, top + h);
          for (let gy = top; gy <= top + h; gy += preview ? 20 : 36) line(left, gy, left + w, gy);
          ctx.globalAlpha = 1;
          if (map.id === "bull") drawBullScene(x, y, w, h, preview);
          else if (map.id === "bear") drawBearScene(x, y, w, h, preview);
          else if (map.id === "ethprism") drawEthPrismScene(x, y, w, h, preview);
          else if (map.id === "liquidation") drawLiquidationScene(x, y, w, h, preview);
          else if (map.id === "btccitadel") drawBtcCitadelScene(x, y, w, h, preview);
          else drawTerminalScene(x, y, w, h, preview);
        }

        function drawTerminalScene(x, y, w, h, preview) {
          ctx.save();
          ctx.strokeStyle = "#2defff";
          ctx.lineWidth = preview ? 2 : 3;
          ctx.globalAlpha = 0.82;
          roundRect(x - w * 0.38, y - h * 0.24, w * 0.76, h * 0.48, 8, "rgba(2,12,22,.64)");
          ctx.strokeStyle = "rgba(45,239,255,.72)";
          roundedPath(x - w * 0.38, y - h * 0.24, w * 0.76, h * 0.48, 8);
          ctx.stroke();
          ctx.beginPath();
          for (let i = 0; i < 8; i += 1) {
            const px = x - w * 0.31 + i * w * 0.088;
            const py = y + h * 0.13 - Math.sin(i * 0.9) * h * 0.16;
            if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
          }
          ctx.stroke();
          drawVTLogo(x + w * 0.24, y - h * 0.02, preview ? 13 : 28);
          ctx.restore();
        }

        function drawBullScene(x, y, w, h, preview) {
          ctx.save();
          ctx.globalAlpha = 0.9;
          ctx.strokeStyle = "#30ff9f";
          ctx.lineWidth = preview ? 3 : 5;
          ctx.beginPath();
          ctx.moveTo(x - w * 0.38, y + h * 0.22);
          ctx.lineTo(x - w * 0.12, y + h * 0.02);
          ctx.lineTo(x + w * 0.08, y - h * 0.08);
          ctx.lineTo(x + w * 0.34, y - h * 0.30);
          ctx.stroke();
          line(x + w * 0.2, y - h * 0.30, x + w * 0.34, y - h * 0.30);
          line(x + w * 0.34, y - h * 0.30, x + w * 0.34, y - h * 0.15);
          ctx.globalAlpha = 0.45;
          for (let i = 0; i < 6; i += 1) roundRect(x - w * 0.36 + i * w * 0.13, y + h * 0.30 - i * h * 0.07, w * 0.055, h * (0.18 + i * 0.028), 3, "#30ff9f");
          ctx.restore();
        }

        function drawBearScene(x, y, w, h, preview) {
          ctx.save();
          ctx.globalAlpha = 0.92;
          ctx.strokeStyle = "#ff4564";
          ctx.lineWidth = preview ? 3 : 5;
          ctx.beginPath();
          ctx.moveTo(x - w * 0.38, y - h * 0.24);
          ctx.lineTo(x - w * 0.12, y - h * 0.03);
          ctx.lineTo(x + w * 0.02, y + h * 0.18);
          ctx.lineTo(x + w * 0.34, y + h * 0.02);
          ctx.stroke();
          ctx.globalAlpha = 0.35;
          ctx.fillStyle = "#ff4564";
          for (let i = 0; i < 5; i += 1) {
            ctx.beginPath();
            ctx.moveTo(x - w * 0.42 + i * w * 0.2, y - h * 0.38);
            ctx.lineTo(x - w * 0.35 + i * w * 0.2, y - h * 0.38);
            ctx.lineTo(x - w * 0.40 + i * w * 0.2, y + h * 0.38);
            ctx.closePath();
            ctx.fill();
          }
          ctx.restore();
        }

        function drawEthPrismScene(x, y, w, h, preview) {
          ctx.save();
          ctx.globalAlpha = 0.92;
          ctx.strokeStyle = "#8b7dff";
          ctx.lineWidth = preview ? 2 : 4;
          const pts = [[x, y - h * 0.34], [x + w * 0.24, y], [x, y + h * 0.34], [x - w * 0.24, y]];
          ctx.beginPath();
          pts.forEach((p, i) => { if (!i) ctx.moveTo(p[0], p[1]); else ctx.lineTo(p[0], p[1]); });
          ctx.closePath();
          ctx.stroke();
          line(x, y - h * 0.34, x, y + h * 0.34);
          line(x - w * 0.24, y, x + w * 0.24, y);
          ctx.strokeStyle = "#2defff";
          [[-0.36, 0.28], [-0.18, -0.20], [0.32, -0.28], [0.38, 0.22]].forEach(([px, py], i) => {
            circle(x + px * w, y + py * h, preview ? 3 : 5, i % 2 ? "#2defff" : "#8b7dff");
          });
          ctx.restore();
        }

        function drawLiquidationScene(x, y, w, h, preview) {
          ctx.save();
          ctx.globalAlpha = 0.86;
          const colors = ["#00e5ff", "#ff45d7", "#7d5cff", "#ff4564"];
          for (let i = 0; i < 7; i += 1) {
            const bx = x - w * 0.40 + i * w * 0.13;
            const bh = h * (0.25 + (i % 4) * 0.12);
            roundRect(bx, y + h * 0.36 - bh, w * 0.065, bh, 3, colors[i % colors.length]);
          }
          ctx.strokeStyle = "#ff45d7";
          ctx.lineWidth = preview ? 2 : 4;
          line(x - w * 0.44, y - h * 0.34, x + w * 0.44, y + h * 0.34);
          line(x + w * 0.44, y - h * 0.34, x - w * 0.44, y + h * 0.34);
          ctx.restore();
        }

        function drawBtcCitadelScene(x, y, w, h, preview) {
          ctx.save();
          ctx.globalAlpha = 0.9;
          for (let i = 0; i < 5; i += 1) {
            const bx = x - w * 0.34 + i * w * 0.17;
            const bh = h * (0.42 + (i === 2 ? 0.18 : 0));
            roundRect(bx, y + h * 0.32 - bh, w * 0.09, bh, 4, "#ffd35a");
            ctx.strokeStyle = "#fff08a";
            line(bx + w * 0.045, y + h * 0.18 - bh, bx + w * 0.045, y + h * 0.36);
          }
          circle(x + w * 0.28, y - h * 0.20, preview ? 13 : 32, "rgba(255,211,90,.32)");
          text("BTC", x + w * 0.28, y - h * 0.20, preview ? 9 : 20, "#ffd35a", "950");
          ctx.restore();
        }

        function drawMarketMedallion(skin, x, y, r) {
          ctx.save();
          ctx.shadowColor = skin.accent;
          ctx.shadowBlur = r * 1.6;
          circle(x, y, r, "#ffd75e");
          ctx.shadowBlur = 0;
          ctx.strokeStyle = "#fff3ad";
          ctx.lineWidth = Math.max(1.4, r * 0.18);
          ctx.beginPath();
          ctx.arc(x, y, r - 3, 0, Math.PI * 2);
          ctx.stroke();
          const ring = ctx.createLinearGradient(x - r, y - r, x + r, y + r);
          ring.addColorStop(0, "#19e8ff");
          ring.addColorStop(0.55, skin.accent);
          ring.addColorStop(1, "#8b5cff");
          ctx.strokeStyle = ring;
          ctx.lineWidth = Math.max(1.2, r * 0.14);
          ctx.beginPath();
          ctx.arc(x, y, r * 0.52, -0.2, Math.PI * 1.72);
          ctx.stroke();
          drawMarketIcon(skin, x, y + 0.5, r * 0.78);
          ctx.restore();
        }

        function drawRocketMedallion(skin, mode) {
          if (mode === "game" && skin.id === "vt") return;
          const r = mode === "promo" ? 9 : mode === "shop" ? 8 : 5.8;
          const x = mode === "game" ? -47 : -49;
          const y = mode === "game" ? 31 : 36;
          ctx.strokeStyle = "rgba(220,245,255,.62)";
          ctx.lineWidth = mode === "game" ? 1.2 : 1.8;
          line(x - 8, y - r - 8, x - 2, y - r + 1);
          drawMarketMedallion(skin, x, y, r);
        }

        function drawPremiumRocketBody(skin, mode = "game") {
          const spec = rocketSpec(skin);
          ctx.save();
          ctx.shadowColor = skin.trail;
          ctx.shadowBlur = 24;

          const metal = ctx.createLinearGradient(-62, -34, spec.nose, 32);
          metal.addColorStop(0, "#07111f");
          metal.addColorStop(0.25, skin.body);
          metal.addColorStop(0.54, "#111827");
          metal.addColorStop(0.78, spec.body === "crown" ? "#ffe7a6" : "#dce8ff");
          metal.addColorStop(1, "#070b14");

          drawRocketFins(skin, spec);

          ctx.fillStyle = metal;
          ctx.beginPath();
          ctx.moveTo(spec.tail, -20);
          ctx.bezierCurveTo(-30, -spec.top, 30, -spec.top - 2, spec.nose, -12);
          ctx.bezierCurveTo(spec.nose + 12, -4, spec.nose + 12, 4, spec.nose, 12);
          ctx.bezierCurveTo(30, spec.bottom + 2, -30, spec.bottom, spec.tail, 20);
          ctx.bezierCurveTo(-68, 9, -68, -9, spec.tail, -20);
          ctx.closePath();
          ctx.fill();

          ctx.shadowBlur = 0;
          ctx.strokeStyle = "rgba(239,252,255,.72)";
          ctx.lineWidth = 2;
          ctx.stroke();

          if (spec.armor) {
            ctx.fillStyle = "rgba(3,8,18,.36)";
            for (let i = 0; i < spec.armor; i += 1) {
              roundRect(-4 + i * 17, -25 + i * 2, 14, 50 - i * 4, 5, "rgba(3,8,18,.32)");
            }
          }

          drawPremiumSkinSilhouette(skin, spec, mode);
          drawRocketDetails(skin, spec);

          roundRect(28, -19, 34, 38, 15, "rgba(4,10,18,.92)");
          if (spec.cockpit === "slash" || spec.cockpit === "hot") {
            ctx.save();
            ctx.rotate(-0.14);
            roundRect(43, -7, 16, 9, 5, skin.cockpit);
            ctx.restore();
          } else if (spec.cockpit === "crystal" || spec.cockpit === "crown") {
            ctx.fillStyle = skin.cockpit;
            path([[42, -13], [57, -5], [54, 11], [39, 13], [35, -2]]);
          } else {
            roundRect(45, -8, 7, 16, 4, skin.cockpit);
          }

          drawRocketCore(skin, spec);
          drawRocketMedallion(skin, mode);

          roundRect(-72, -16, spec.engine, 32, 7, "#07101b");
          ctx.strokeStyle = skin.trail;
          ctx.lineWidth = 2;
          roundedPath(-72, -16, spec.engine, 32, 7);
          ctx.stroke();
          if (spec.exhaust > 1.1) {
            ctx.globalAlpha = 0.55;
            ctx.strokeStyle = skin.trail;
            ctx.lineWidth = 2;
            line(-77, -10, -91, -18);
            line(-77, 10, -91, 18);
            ctx.globalAlpha = 1;
          }

          ctx.restore();
        }
