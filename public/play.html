        function drawVTLogo(x, y, r) {
          ctx.save();
          ctx.translate(x, y);
          const grad = ctx.createLinearGradient(-r, -r, r, r);
          grad.addColorStop(0, "#20f2ff");
          grad.addColorStop(0.55, "#2477ff");
          grad.addColorStop(1, "#8b5cff");
          ctx.strokeStyle = grad;
          ctx.lineWidth = Math.max(2, r * 0.1);
          ctx.beginPath();
          ctx.arc(0, 0, r, -0.18, Math.PI * 1.72);
          ctx.stroke();
          ctx.font = `900 ${Math.floor(r * 0.72)}px Inter, system-ui, sans-serif`;
          ctx.fillStyle = "#30fff1";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText("VT", 0, 1);
          ctx.restore();
        }

        function drawMarketCandles(x, y, scale) {
          ctx.save();
          ctx.translate(x, y);
          ctx.scale(scale, scale);
          const data = [32, 48, 42, 64, 55, 82, 76, 102];
          data.forEach((h, i) => {
            const cx = i * 24;
            const up = i !== 2 && i !== 5;
            ctx.strokeStyle = up ? "rgba(0,229,255,.26)" : "rgba(125,92,255,.3)";
            ctx.lineWidth = 3;
            line(cx, 88 - h - 18, cx, 104 - h + 42);
            roundRect(cx - 8, 88 - h, 16, h, 3, up ? "rgba(0,229,255,.2)" : "rgba(125,92,255,.24)");
          });
          ctx.restore();
        }

        function drawTerminalCore() {
          ctx.save();
          ctx.globalAlpha = 0.22;
          ctx.strokeStyle = "#2defff";
          ctx.lineWidth = 2;
          roundedPath(334, 208, 142, 92, 18);
          ctx.stroke();
          ctx.beginPath();
          for (let i = 0; i < 7; i += 1) {
            const x = 352 + i * 18;
            const y = 264 - Math.sin(i * 0.85) * 22;
            if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
          }
          ctx.stroke();
          ctx.globalAlpha = 0.16;
          drawVTLogo(450, 250, 28);
          ctx.restore();
        }

        function drawEdgeCandles(color, alpha) {
          ctx.save();
          ctx.globalAlpha = alpha;
          ctx.fillStyle = color;
          [38, 88, 452, 500].forEach((x, i) => {
            const h = 94 + i * 26;
            roundRect(x - 9, 124 + i * 42, 18, h, 4, color);
            ctx.strokeStyle = color;
            ctx.lineWidth = 2;
            line(x, 104 + i * 42, x, 236 + h * 0.35 + i * 42);
          });
          ctx.globalAlpha = 0.16;
          ctx.fillStyle = color;
          for (let i = 0; i < 7; i += 1) {
            ctx.beginPath();
            ctx.moveTo(18 + i * 86, 0);
            ctx.lineTo(72 + i * 86, 0);
            ctx.lineTo(18 + i * 86, H);
            ctx.closePath();
            ctx.fill();
          }
          ctx.restore();
        }

        function drawCityCandles() {
          ctx.save();
          ctx.globalAlpha = 0.36;
          const colors = ["#00e5ff", "#ff45d7", "#7d5cff", "#ff4564"];
          for (let i = 0; i < 12; i += 1) {
            const x = 24 + i * 48;
            const h = 74 + (i % 5) * 42;
            roundRect(x - 14, 770 - h, 28, h, 4, colors[i % colors.length]);
            ctx.strokeStyle = colors[i % colors.length];
            ctx.lineWidth = 2;
            line(x, 732 - h, x, 800);
          }
          ctx.globalAlpha = 0.16;
          ctx.strokeStyle = "#ff45d7";
          ctx.lineWidth = 4;
          for (let i = 0; i < 4; i += 1) line(20 + i * 150, 300, 128 + i * 150, 650);
          ctx.restore();
        }

        function drawPrismNetwork() {
          ctx.save();
          ctx.globalAlpha = 0.42;
          ctx.strokeStyle = "#8b7dff";
          ctx.lineWidth = 1.5;
          const pts = [[392, 145], [492, 228], [414, 342], [508, 470], [360, 596], [474, 744], [318, 820]];
          pts.forEach((p, i) => {
            circle(p[0], p[1], 4.2, i % 2 ? "#2defff" : "#8b7dff");
            if (i) line(pts[i - 1][0], pts[i - 1][1], p[0], p[1]);
          });
          ctx.globalAlpha = 0.14;
          ctx.fillStyle = "#8b7dff";
          ctx.beginPath();
          ctx.moveTo(76, 245);
          ctx.lineTo(166, 112);
          ctx.lineTo(254, 245);
          ctx.lineTo(164, 370);
          ctx.closePath();
          ctx.fill();
          ctx.restore();
        }

        function drawCitadel() {
          ctx.save();
          ctx.globalAlpha = 0.34;
          ctx.fillStyle = "#ffd35a";
          for (let i = 0; i < 7; i += 1) {
            const x = 42 + i * 76;
            const h = 70 + (i % 3) * 32;
            roundRect(x - 15, 150 - h * 0.25, 30, h, 4, "#ffd35a");
            ctx.strokeStyle = "#fff08a";
            line(x, 118 - h * 0.4, x, 190);
          }
          ctx.globalAlpha = 0.18;
          circle(444, 248, 62, "#ffd35a");
          text("BTC", 444, 250, 24, "#ffd35a", "950");
          ctx.restore();
        }

        function drawCodeRain() {
          ctx.save();
          ctx.font = "700 11px ui-monospace, Consolas, monospace";
          ctx.fillStyle = "rgba(91, 240, 255, .14)";
          ["if (trend) {", "risk.manage();", "enter();", "} else {", "wait();", "// observe"].forEach((lineText, i) => {
            ctx.fillText(lineText, 30, 142 + i * 18);
          });
          ctx.restore();
        }

        function pointerPos(e) {
          const r = canvas.getBoundingClientRect();
          return { x: (e.clientX - r.left) * W / r.width, y: (e.clientY - r.top) * H / r.height };
        }

        canvas.addEventListener("pointerdown", (e) => {
          const p = pointerPos(e);
          click(p.x, p.y);
        });
        nickCancel.addEventListener("click", closeNicknameModal);
        nickSave.addEventListener("click", saveNicknameFromModal);
        nickInput.addEventListener("input", () => {
          if (modalMode === "nickname") nickInput.value = sanitizeNickname(nickInput.value);
          else nickInput.value = String(nickInput.value || "").replace(/[^a-zA-Z0-9_-]/g, "").slice(0, 24);
          nickError.textContent = "";
        });
        nickInput.addEventListener("keydown", (e) => {
          if (e.key === "Enter") saveNicknameFromModal();
          if (e.key === "Escape") closeNicknameModal();
        });
        window.addEventListener("keydown", (e) => {
          if (!nickModal.hidden) return;
          if (e.code === "Space") flap();
        });

        function frame(now) {
          const dt = Math.min(0.033, (now - last) / 1000);
          last = now;
          update(dt);
          ctx.save();
          if (impact > 0) {
            impact -= 1;
            ctx.translate((Math.random() - 0.5) * impact, (Math.random() - 0.5) * impact);
          }
          if (bootLoading) {
            drawBootLoading();
            ctx.restore();
            requestAnimationFrame(frame);
            return;
          }
          if (state === "start") drawStart();
          if (state === "game") drawGame();
          if (state === "over") drawOver();
          if (state === "shop") drawShop();
          if (state === "maps") drawMaps();
          if (state === "leaders") drawLeaders();
          if (state === "daily") drawDaily();
          if (state === "nickname") drawNickname();
          if (state === "settings") drawSettings();
          ctx.restore();
          requestAnimationFrame(frame);
        }

        function btn(x, y, w, h, label, color) {
          ctx.save();
          ctx.shadowColor = color;
          ctx.shadowBlur = 20;
          const fill = ctx.createLinearGradient(x - w / 2, y - h / 2, x + w / 2, y + h / 2);
          fill.addColorStop(0, "rgba(7,18,34,.98)");
          fill.addColorStop(0.5, "rgba(5,10,24,.96)");
          fill.addColorStop(1, "rgba(18,12,42,.96)");
          roundRect(x - w / 2, y - h / 2, w, h, 8, fill);
          ctx.shadowBlur = 0;
          ctx.strokeStyle = color;
          ctx.lineWidth = 2;
          roundedPath(x - w / 2, y - h / 2, w, h, 8);
          ctx.stroke();
          ctx.globalAlpha = 0.32;
          ctx.fillStyle = color;
          ctx.fillRect(x - w / 2 + 12, y - h / 2 + 8, w - 24, 2);
          ctx.globalAlpha = 1;
          text(label, x, y + 2, fitTextSize(label, h < 56 ? 17 : 22, w - 24), "#effcff", "900");
          ctx.restore();
        }

        function fitTextSize(label, size, maxWidth) {
          ctx.font = `900 ${size}px Inter, system-ui, sans-serif`;
          let next = size;
          while (next > 10 && ctx.measureText(String(label)).width > maxWidth) {
            next -= 1;
            ctx.font = `900 ${next}px Inter, system-ui, sans-serif`;
          }
          return next;
        }

        function panel(x, y, w, h, stroke) {
          const fill = ctx.createLinearGradient(x - w / 2, y - h / 2, x + w / 2, y + h / 2);
          fill.addColorStop(0, "rgba(7,18,34,.92)");
          fill.addColorStop(0.52, "rgba(4,9,20,.9)");
          fill.addColorStop(1, "rgba(18,12,42,.82)");
          roundRect(x - w / 2, y - h / 2, w, h, 8, fill);
          ctx.strokeStyle = stroke;
          ctx.globalAlpha = 0.7;
          ctx.lineWidth = 2;
          roundedPath(x - w / 2, y - h / 2, w, h, 8);
          ctx.stroke();
          ctx.globalAlpha = 0.2;
          ctx.strokeStyle = "#ffffff";
          roundedPath(x - w / 2 + 4, y - h / 2 + 4, w - 8, h - 8, 6);
          ctx.stroke();
          ctx.globalAlpha = 1;
        }

        function pill(x, y, label, value, color) {
          roundRect(x - 60, y - 22, 120, 44, 8, "rgba(5,13,26,.88)");
          ctx.strokeStyle = "rgba(46,223,255,.36)";
          ctx.lineWidth = 1;
          roundedPath(x - 60, y - 22, 120, 44, 8);
          ctx.stroke();
          leftText(label, x - 45, y - 8, 11, "#729cab", "800");
          leftText(value, x - 45, y + 13, 18, color, "900");
        }

        function text(s, x, y, size, color, weight) {
          ctx.font = `${weight || 800} ${size}px Inter, system-ui, sans-serif`;
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          if (size >= 32) {
            ctx.save();
            ctx.shadowColor = "rgba(0, 229, 255, .55)";
            ctx.shadowBlur = 14;
            ctx.lineWidth = Math.max(3, size * 0.08);
            ctx.strokeStyle = "rgba(3, 8, 18, .92)";
            ctx.strokeText(s, x, y);
            ctx.restore();
          }
          ctx.fillStyle = color;
          ctx.fillText(s, x, y);
        }

        function leftText(s, x, y, size, color, weight) {
          ctx.font = `${weight || 800} ${size}px Inter, system-ui, sans-serif`;
          ctx.fillStyle = color;
          ctx.textAlign = "left";
          ctx.textBaseline = "middle";
          ctx.fillText(s, x, y);
        }

        function roundRect(x, y, w, h, r, fill) {
          roundedPath(x, y, w, h, r);
          ctx.fillStyle = fill;
          ctx.fill();
        }

        function roundedPath(x, y, w, h, r) {
          const rr = Math.min(r, w / 2, h / 2);
          ctx.beginPath();
          ctx.moveTo(x + rr, y);
          ctx.arcTo(x + w, y, x + w, y + h, rr);
          ctx.arcTo(x + w, y + h, x, y + h, rr);
          ctx.arcTo(x, y + h, x, y, rr);
          ctx.arcTo(x, y, x + w, y, rr);
          ctx.closePath();
        }

        function circle(x, y, r, fill) {
          if (fill) ctx.fillStyle = fill;
          ctx.beginPath();
          ctx.arc(x, y, r, 0, Math.PI * 2);
          ctx.fill();
        }

        function line(x1, y1, x2, y2) {
          ctx.beginPath();
          ctx.moveTo(x1, y1);
          ctx.lineTo(x2, y2);
          ctx.stroke();
        }

        function path(points) {
          ctx.beginPath();
          ctx.moveTo(points[0][0], points[0][1]);
          points.slice(1).forEach((p) => ctx.lineTo(p[0], p[1]));
          ctx.closePath();
          ctx.fill();
        }

        function inRect(px, py, x, y, w, h) {
          return px >= x - w / 2 && px <= x + w / 2 && py >= y - h / 2 && py <= y + h / 2;
        }

        stars = Array.from({ length: 64 }, (_, i) => ({
          x: Math.random() * W,
          y: Math.random() * H,
          r: 0.7 + Math.random() * 1.8,
          s: 18 + (i % 5) * 12,
          c: ["#65f6ff", "#7d74ff", "#ffd75e", "#52ff9b"][i % 4]
        }));
        loadConfig();
        loadLeaderboard();
        loadCloudProfile();
        requestAnimationFrame(frame);
      })();
    </script>
  </body>
</html>
